name: Update Story
version: "1.0"
description: "Minimal update workflow triggered by Monitoring Engine — reuses verified story data, re-runs visuals, website, and publishing"

triggers:
  - event: change_detected
    source: monitoring-agent
    condition: severity IN [critical, major]

steps:
  - id: memory
    agent: memory-engine
    required: true
    timeout: 60
    retries: 2
    output: memory.schema.json
    # Retrieves existing story data + monitoring change data
    skip_if: false

  - id: graph
    agent: knowledge-graph
    required: false
    timeout: 60
    retries: 2
    output: graph.schema.json
    depends_on: [memory]
    # Update graph with new entity relationships from change

  - id: visual-planning
    agent: visual-intelligence-agent
    required: false
    timeout: 180
    retries: 2
    output: visual.schema.json
    depends_on: [graph]
    # Re-evaluate visual needs — new data may need new charts

  - id: editorial-review
    agent: editorial-review-agent
    required: true
    timeout: 60
    retries: 1
    output: editorial-review.schema.json
    depends_on: [visual-planning]
    # Lightweight review — validate change update
    # Skip: full fact re-verification (original facts were verified)
    # Check: change summary accuracy, update quality, version increment

  - id: website
    agent: website-agent
    required: true
    timeout: 180
    retries: 2
    output: page.schema.json
    depends_on: [editorial-review]
    # Rebuild page with "What Changed" section + version badge

  - id: publishing
    agent: publishing-agent
    required: true
    timeout: 120
    retries: 2
    output: publishing.schema.json
    depends_on: [website]
    # Republish to all channels with version note

  - id: publish
    timeout: 0
    retries: 0
    terminal: true
    depends_on: [publishing]

quality:
  editorial: 85
  evidence: 90
  trust: 95
  accuracy: 95

failure:
  editorial-review:
    goto: manual_review
  publishing:
    goto: editor_alert

on_success:
  memory_update: true
  notify_editor: true
  version_increment: true

manual_review:
  description: "Flag for editor to manually review the update before publishing"
  timeout: 3600  # 1 hour
  notify: true

editor_alert:
  description: "Send critical alert to editor — publishing failed"
  notify: true
  severity: critical

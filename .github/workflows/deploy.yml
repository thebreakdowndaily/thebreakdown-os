name: Deploy

on:
  push:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline
      - run: npm run precf:build
      - run: npx @opennextjs/cloudflare build -c wrangler.toml
      - name: Debug listing
        run: ls -la .open-next/
      - name: Deploy to Cloudflare Pages
        id: deploy
        continue-on-error: true
        run: |
          npx wrangler@latest pages deploy .open-next --project-name=the-breakdown --branch=main 2>&1 | tee deploy-output.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Upload deploy output (even on failure)
        uses: actions/upload-artifact@v5
        with:
          name: deploy-output
          path: deploy-output.txt

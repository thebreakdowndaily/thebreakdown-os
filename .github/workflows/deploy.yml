name: Deploy

on:
  push:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
      - run: npm ci --prefer-offline
      - run: npm run precf:build
      - run: npx @opennextjs/cloudflare build -c wrangler.toml
      - name: Verify story data
        run: npx tsx -e "const {getStories} = require('./utils/data-layer/store'); const s = getStories({pageSize:100}).data; const eb = s.find(x => x.slug === 'electoral-bonds'); console.log('Stories:', s.length); console.log('electoral-bonds found:', !!eb); if (!eb) { process.exit(1); }"
      - name: Deploy to Cloudflare Pages
        run: ./node_modules/.bin/wrangler pages deploy .open-next --project-name=the-breakdown --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

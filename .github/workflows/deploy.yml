name: Deploy

on:
  push:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline
      - run: npm run precf:build
      - run: npx @opennextjs/cloudflare build -c wrangler.toml
      - name: Verify story data
        run: npx tsx -e "const {getStories} = require('./utils/data-layer/store'); const s = getStories({pageSize:100}).data; const eb = s.find(x => x.slug === 'electoral-bonds'); console.log('Stories:', s.length); console.log('electoral-bonds found:', !!eb); if (!eb) { process.exit(1); }"
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .open-next --project-name=the-breakdown --branch=main

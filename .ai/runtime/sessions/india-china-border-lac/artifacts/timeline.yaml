# Timeline — India–China Border Dispute

| Date | Event | Description | Sources | Claims |
|------|-------|-------------|---------|--------|
| 1913–1914 | Simla Convention | Britain, Tibet, and China meet to define boundaries; McMahon Line proposed | 1 | C01, C02 |
| 1914 | China rejects Simla Convention | China's representative initialled but did not sign; China declares the convention void | 1 | C02 |
| 1947 | India inherits British frontier claims | Independent India adopts the McMahon Line as its border position | 10 | C01 |
| 1949 | Chinese communist victory | PLA occupies Tibet (1950); China and India now share a border | 12, 16 | C12 |
| 1950 | India recognises PRC | India is among the first non-communist states to recognise the People's Republic | 10 | — |
| 1951 | Tibet–China Seventeen-Point Agreement | China consolidates control over Tibet; India's Tibetan buffer ends | 12 | C12 |
| 1954 | Sino-Indian Agreement on Tibet (Panchsheel) | Five Principles of Peaceful Coexistence agreed; border question explicitly deferred | 2 | C04 |
| 1954–1957 | China builds Aksai Chin road | Xinjiang–Tibet highway constructed through disputed territory without Indian knowledge | 3, 12 | C03 |
| 1958 | India discovers Aksai Chin road | Indian patrols discover the road; diplomatic protest issued | 12 | C03 |
| 1959 | Tibetan uprising | Tibetan rebellion against Chinese rule; Dalai Lama flees to India | 3, 12 | C05 |
| 1959 | Nehru–Zhou letters begin | Exchange of letters on border positions; positions are irreconcilable | 3 | C05 |
| 1959 | Longju incident | First border clash — Chinese forces occupy Indian post in eastern sector | 12 | C05 |
| 1960 | Zhou Enlai visits New Delhi | Last major diplomatic effort before the war; no agreement reached | 4, 10 | C06 |
| 1960 | Officials' talks produce joint report | Factual agreement on positions but no political resolution | 4 | C06 |
| 1961 | India adopts "Forward Policy" | India establishes military posts in disputed territory to assert claims | 12 | C08 |
| 1962 (Sep) | Chinese forces advance in eastern sector | PLA attacks Indian posts north of McMahon Line | 5, 12 | C07 |
| 1962 (Oct) | Chinese offensive | Full-scale Chinese attack across both eastern and western sectors | 5, 12 | C07, C08 |
| 1962 (Nov) | Chinese unilateral ceasefire | China announces ceasefire and withdraws to pre-war positions | 5, 12 | C07 |
| 1967 | Nathu La and Cho La clashes | Major border clashes between Indian and Chinese forces | 14 | C10 |
| 1987 | Sumdorong Chu crisis | Border standoff in Arunachal Pradesh — nearly escalates to war | 14 | C10 |
| 1988 | Rajiv Gandhi visits China | First Indian PM visit since Nehru (1954); Joint Working Group established | 10 | — |
| 1991 | Li Peng visits India | First Chinese PM visit since Zhou (1960); further rapprochement | 10 | — |
| 1993 | Peace and Tranquillity Agreement | Agreement to maintain peace along the LAC | 6 | C09 |
| 1996 | Confidence-Building Measures Agreement | Border CBMs including prior notification of military exercises | 7 | C09 |
| 2003 | India recognises Tibet as part of China | Shift in India's position; linked to border talks progress | 10 | — |
| 2005 | Political Parameters and Guiding Principles Agreement | Framework for a political solution to the border dispute agreed | 10 | C09 |
| 2006 | Nathu La border pass reopened | First border crossing opened for trade since 1962 | 10 | — |
| 2013 | Depsang incident | Chinese incursion into Indian territory in Ladakh; BDCA signed in response | 9 | C10 |
| 2014 | Xi Jinping visits India | Modest progress on border issues; strategic rivalry deepens | 10 | — |
| 2017 | Doklam standoff | 73-day military standoff in disputed tri-junction (India, China, Bhutan) | 10, 14 | C10 |
| 2020 (May) | Galwan Valley clashes begin | Series of violent clashes; hand-to-hand combat with severe casualties | 10, 14 | C11 |
| 2020 (Jun) | Galwan Valley fatal clash | 20 Indian soldiers killed; Chinese casualties reported but unconfirmed | 10, 14 | C11 |
| 2020–2021 | Disengagement process | Gradual disengagement from multiple friction points along the LAC | 10 | C11 |
| 2024 | Ongoing military standoff | ~100,000+ troops deployed on both sides; no resolution in sight | 14, 14 | C09, C11 |
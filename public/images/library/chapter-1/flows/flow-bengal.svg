<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: 700; fill: #FFFFFF; }
      .subtitle { font-size: 16px; font-weight: 400; fill: #9CA3AF; }
      .label { font-size: 12px; font-weight: 500; fill: #FFFFFF; }
      .city-label { font-size: 11px; font-weight: 600; fill: #E5E7EB; }
      .river-label { font-size: 9px; font-weight: 400; fill: #60A5FA; font-style: italic; }
      .flow-label { font-size: 14px; font-weight: 700; fill: #FFFFFF; }
      .flow-sublabel { font-size: 11px; font-weight: 400; fill: #D1D5DB; }
      .legend-text { font-size: 11px; font-weight: 400; fill: #9CA3AF; }
      .legend-title { font-size: 12px; font-weight: 600; fill: #FFFFFF; }
      .source { font-size: 10px; font-weight: 400; fill: #6B7280; }
      .border-label { font-size: 13px; font-weight: 600; fill: #EF4444; font-style: italic; }
      .region-label { font-size: 16px; font-weight: 700; fill: rgba(255,255,255,0.25); letter-spacing: 2px; text-transform: uppercase; }
      .inset-title { font-size: 12px; font-weight: 700; fill: #FFFFFF; }
      .inset-label { font-size: 10px; font-weight: 400; fill: #D1D5DB; }
      .inset-num { font-size: 14px; font-weight: 700; fill: #F59E0B; }
    </style>
    <marker id="arrow-east" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#22C55E"/>
    </marker>
    <marker id="arrow-west" markerWidth="14" markerHeight="10" refX="2" refY="5" orient="auto">
      <path d="M14,0 L0,5 L14,10 Z" fill="#3B82F6"/>
    </marker>
    <linearGradient id="bg-grad-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow-g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-b" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-grad-b)"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" class="title">Bengal Migration, 1947–48</text>
  <text x="600" y="68" text-anchor="middle" class="subtitle">Asymmetric Population Exchange Across the Bengal Boundary</text>

  <!-- Bengal Geographic Outline (simplified) -->
  <!-- West Bengal (India side) - left -->
  <path d="M120,140 L260,110 L360,130 L400,180 L430,260 L445,340 L450,420 L440,500 L420,570 L380,620 L330,650 L270,660 L200,650 L150,620 L120,570 L100,500 L90,420 L85,340 L90,260 L100,190 Z" 
        fill="#1A2A3A" fill-opacity="0.3" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.4"/>
  
  <!-- East Bengal (Pakistan/Bangladesh side) - right -->
  <path d="M470,120 L620,100 L750,120 L850,160 L920,220 L970,300 L1000,390 L1010,470 L1000,540 L970,600 L920,640 L850,665 L770,675 L680,670 L600,650 L530,610 L490,560 L465,500 L455,430 L450,350 L455,270 L460,200 Z" 
        fill="#1A3A2A" fill-opacity="0.3" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Region Labels -->
  <text x="260" y="380" text-anchor="middle" class="region-label">WEST BENGAL</text>
  <text x="740" y="380" text-anchor="middle" class="region-label">EAST BENGAL</text>
  <text x="260" y="400" text-anchor="middle" style="font-size:11px;fill:#3B82F6;font-weight:500;opacity:0.7;">India</text>
  <text x="740" y="400" text-anchor="middle" style="font-size:11px;fill:#22C55E;font-weight:500;opacity:0.7;">Pakistan (East)</text>

  <!-- Rivers -->
  <!-- Ganges/Padma -->
  <path d="M180,200 Q300,260 460,300 Q620,340 780,380 Q900,410 1000,440" 
        fill="none" stroke="#60A5FA" stroke-width="2" stroke-opacity="0.4"/>
  <text x="350" y="255" class="river-label">Ganges / Padma</text>

  <!-- Brahmaputra/Jamuna -->
  <path d="M800,100 Q820,200 830,300 Q840,400 850,500 Q860,580 870,660" 
        fill="none" stroke="#60A5FA" stroke-width="1.8" stroke-opacity="0.35"/>
  <text x="850" y="200" class="river-label" transform="rotate(-85,850,200)">Brahmaputra / Jamuna</text>

  <!-- Meghna -->
  <path d="M920,280 Q940,360 950,440 Q960,520 965,600" 
        fill="none" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="970" y="400" class="river-label">Meghna</text>

  <!-- RADCLIFFE LINE -->
  <path d="M455,120 Q458,250 460,380 Q462,500 465,670" 
        fill="none" stroke="#EF4444" stroke-width="3" stroke-dasharray="12,6" stroke-opacity="0.9"/>
  <path d="M455,120 Q458,250 460,380 Q462,500 465,670" 
        fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="12,6" stroke-opacity="0.3"/>
  <rect x="380" y="100" width="160" height="22" rx="4" fill="#1F2937" fill-opacity="0.9" stroke="#EF4444" stroke-width="1"/>
  <text x="460" y="116" text-anchor="middle" class="border-label">Radcliffe Line, 17 Aug 1947</text>

  <!-- MIGRATION ARROW: East → West (~3.5M Hindus) — LARGE -->
  <path d="M700,280 C580,240 400,240 280,280" 
        fill="none" stroke="#22C55E" stroke-width="35" stroke-opacity="0.15" stroke-linecap="round"/>
  <path d="M700,280 C580,240 400,240 280,280" 
        fill="none" stroke="#22C55E" stroke-width="3" stroke-opacity="0.9" stroke-linecap="round"
        marker-end="url(#arrow-west)" filter="url(#glow-g)"/>
  
  <rect x="400" y="215" width="200" height="40" rx="6" fill="#0A0A0A" fill-opacity="0.85" stroke="#22C55E" stroke-width="1"/>
  <text x="500" y="233" text-anchor="middle" class="flow-label" fill="#22C55E">→ ~3.5 Million</text>
  <text x="500" y="249" text-anchor="middle" class="flow-sublabel">Hindus moving West</text>

  <!-- MIGRATION ARROW: West → East (~0.7M Muslims) — SMALL (asymmetric!) -->
  <path d="M280,460 C400,500 580,500 700,460" 
        fill="none" stroke="#3B82F6" stroke-width="14" stroke-opacity="0.15" stroke-linecap="round"/>
  <path d="M280,460 C400,500 580,500 700,460" 
        fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-opacity="0.9" stroke-linecap="round"
        marker-end="url(#arrow-east)" filter="url(#glow-b)"/>
  
  <rect x="400" y="490" width="200" height="40" rx="6" fill="#0A0A0A" fill-opacity="0.85" stroke="#3B82F6" stroke-width="1"/>
  <text x="500" y="508" text-anchor="middle" class="flow-label" fill="#3B82F6">← ~0.7 Million</text>
  <text x="500" y="524" text-anchor="middle" class="flow-sublabel">Muslims moving East</text>

  <!-- Asymmetry callout -->
  <rect x="560" y="540" width="220" height="50" rx="6" fill="#7F1D1D" fill-opacity="0.4" stroke="#EF4444" stroke-width="1" stroke-opacity="0.6"/>
  <text x="670" y="558" text-anchor="middle" style="font-size:10px;fill:#FCA5A5;font-weight:600;">⚠ ASYMMETRY</text>
  <text x="670" y="573" text-anchor="middle" style="font-size:10px;fill:#FCA5A5;">Hindu exodus 5× larger than Muslim departure</text>

  <!-- Ferry route lines (dotted) -->
  <path d="M300,420 Q460,440 650,420" fill="none" stroke="#D97706" stroke-width="1.2" stroke-dasharray="3,5" stroke-opacity="0.5"/>
  <text x="480" y="438" text-anchor="middle" style="font-size:9px;fill:#D97706;">River Ferry Route</text>

  <!-- CITIES: West Bengal -->
  <circle cx="240" cy="310" r="6" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="240" y="298" text-anchor="middle" class="city-label" style="font-size:12px;">Calcutta</text>

  <circle cx="200" cy="380" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="200" y="395" text-anchor="middle" class="city-label">Jessore</text>

  <!-- CITIES: East Bengal -->
  <circle cx="780" cy="300" r="6" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="780" y="288" text-anchor="middle" class="city-label" style="font-size:12px;">Dhaka</text>

  <circle cx="920" cy="350" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="920" y="340" text-anchor="middle" class="city-label">Chittagong</text>

  <circle cx="700" cy="240" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="700" y="230" text-anchor="middle" class="city-label">Rajshahi</text>

  <circle cx="750" cy="420" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="750" y="435" text-anchor="middle" class="city-label">Khulna</text>

  <circle cx="830" cy="340" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="830" y="330" text-anchor="middle" class="city-label">Mymensingh</text>

  <circle cx="860" cy="420" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="860" y="410" text-anchor="middle" class="city-label">Narayanganj</text>

  <!-- Refugee camp clusters near Calcutta -->
  <g transform="translate(280,360)">
    <polygon points="0,-10 -8,4 8,4" fill="#F59E0B" fill-opacity="0.6" stroke="#F59E0B" stroke-width="0.8"/>
    <line x1="0" y1="-10" x2="0" y2="4" stroke="#F59E0B" stroke-width="0.6"/>
  </g>
  <g transform="translate(295,365)">
    <polygon points="0,-8 -6,3 6,3" fill="#F59E0B" fill-opacity="0.5" stroke="#F59E0B" stroke-width="0.7"/>
  </g>
  <g transform="translate(310,358)">
    <polygon points="0,-9 -7,3 7,3" fill="#F59E0B" fill-opacity="0.5" stroke="#F59E0B" stroke-width="0.7"/>
  </g>
  <g transform="translate(325,363)">
    <polygon points="0,-7 -5,2 5,2" fill="#F59E0B" fill-opacity="0.4" stroke="#F59E0B" stroke-width="0.6"/>
  </g>
  <text x="310" y="385" text-anchor="middle" style="font-size:9px;fill:#F59E0B;">Camp clusters</text>

  <!-- LEGEND -->
  <rect x="920" y="600" width="260" height="185" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#374151" stroke-width="1"/>
  <text x="940" y="625" class="legend-title">Legend</text>
  
  <line x1="940" y1="648" x2="990" y2="648" stroke="#22C55E" stroke-width="4" stroke-linecap="round"/>
  <text x="1000" y="652" class="legend-text">≈ 1 Million people</text>
  
  <line x1="940" y1="673" x2="980" y2="673" stroke="#22C55E" stroke-width="3" marker-end="url(#arrow-west)"/>
  <text x="1000" y="677" class="legend-text">East → West (to India)</text>
  
  <line x1="940" y1="698" x2="980" y2="698" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="1000" y="702" class="legend-text">West → East (to Pakistan)</text>

  <polygon points="955,720 947,732 963,732" fill="#F59E0B" fill-opacity="0.6" stroke="#F59E0B" stroke-width="1"/>
  <text x="1000" y="730" class="legend-text">Refugee Camp</text>

  <line x1="940" y1="748" x2="990" y2="748" stroke="#D97706" stroke-width="1.2" stroke-dasharray="3,5"/>
  <text x="1000" y="752" class="legend-text">River Ferry Route</text>

  <line x1="940" y1="772" x2="990" y2="772" stroke="#EF4444" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="1000" y="776" class="legend-text">Radcliffe Border</text>

  <!-- COMPARISON INSET -->
  <rect x="30" y="600" width="310" height="120" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="185" y="625" text-anchor="middle" class="inset-title">Migration Comparison</text>
  <line x1="50" y1="635" x2="320" y2="635" stroke="#374151" stroke-width="1"/>
  
  <text x="50" y="660" class="inset-label">Punjab total:</text>
  <text x="305" y="660" text-anchor="end" class="inset-num">~9 Million</text>
  <rect x="50" y="668" width="250" height="6" rx="3" fill="#374151"/>
  <rect x="50" y="668" width="250" height="6" rx="3" fill="#F59E0B" fill-opacity="0.7"/>
  
  <text x="50" y="695" class="inset-label">Bengal total:</text>
  <text x="305" y="695" text-anchor="end" class="inset-num">~4.2 Million</text>
  <rect x="50" y="703" width="250" height="6" rx="3" fill="#374151"/>
  <rect x="50" y="703" width="117" height="6" rx="3" fill="#F59E0B" fill-opacity="0.7"/>

  <text x="185" y="718" text-anchor="middle" style="font-size:9px;fill:#9CA3AF;">Punjab: 2.1× Bengal's volume</text>

  <!-- Data source -->
  <text x="600" y="790" text-anchor="middle" class="source">Data: Census of India 1941 &amp; 1951; Suranjan Das, "Communal Riots in Bengal" (1991); Barbara Metcalf &amp; Thomas Metcalf, "A Concise History of Modern India" (2012)</text>
</svg>
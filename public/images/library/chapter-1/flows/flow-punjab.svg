<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: 700; fill: #FFFFFF; }
      .subtitle { font-size: 16px; font-weight: 400; fill: #9CA3AF; }
      .label { font-size: 12px; font-weight: 500; fill: #FFFFFF; }
      .city-label { font-size: 11px; font-weight: 600; fill: #E5E7EB; }
      .river-label { font-size: 9px; font-weight: 400; fill: #60A5FA; font-style: italic; }
      .flow-label { font-size: 14px; font-weight: 700; fill: #FFFFFF; }
      .flow-sublabel { font-size: 11px; font-weight: 400; fill: #D1D5DB; }
      .legend-text { font-size: 11px; font-weight: 400; fill: #9CA3AF; }
      .legend-title { font-size: 12px; font-weight: 600; fill: #FFFFFF; }
      .source { font-size: 10px; font-weight: 400; fill: #6B7280; }
      .border-label { font-size: 13px; font-weight: 600; fill: #EF4444; font-style: italic; }
      .region-label { font-size: 16px; font-weight: 700; fill: rgba(255,255,255,0.25); letter-spacing: 2px; text-transform: uppercase; }
      @keyframes flowPulse { 0%,100%{opacity:0.85} 50%{opacity:1} }
    </style>
    <marker id="arrow-east" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#22C55E"/>
    </marker>
    <marker id="arrow-west" markerWidth="14" markerHeight="10" refX="2" refY="5" orient="auto">
      <path d="M14,0 L0,5 L14,10 Z" fill="#3B82F6"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" class="title">Punjab Migration, 1947–48</text>
  <text x="600" y="68" text-anchor="middle" class="subtitle">Bidirectional Population Exchange Across the Punjab Boundary</text>

  <!-- Punjab Geographic Outline (simplified polygon) -->
  <!-- West Punjab (Pakistan side) - left of Radcliffe -->
  <path d="M180,140 L340,110 L420,130 L460,180 L480,260 L490,340 L485,420 L470,490 L440,540 L400,580 L350,610 L290,630 L230,640 L180,620 L150,580 L130,520 L120,450 L115,380 L120,310 L135,240 L155,180 Z" 
        fill="#1A3A2A" fill-opacity="0.3" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.4"/>
  
  <!-- East Punjab (India side) - right of Radcliffe -->
  <path d="M500,160 L620,130 L720,140 L800,170 L860,220 L900,290 L920,370 L930,440 L920,510 L890,560 L840,600 L780,630 L710,640 L640,635 L580,610 L530,570 L500,520 L490,460 L485,390 L488,310 L492,240 Z" 
        fill="#1A2A3A" fill-opacity="0.3" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Region Labels -->
  <text x="300" y="380" text-anchor="middle" class="region-label">WEST PUNJAB</text>
  <text x="710" y="380" text-anchor="middle" class="region-label">EAST PUNJAB</text>
  <text x="300" y="400" text-anchor="middle" style="font-size:11px;fill:#22C55E;font-weight:500;opacity:0.7;">Pakistan</text>
  <text x="710" y="400" text-anchor="middle" style="font-size:11px;fill:#3B82F6;font-weight:500;opacity:0.7;">India</text>

  <!-- Rivers (thin blue lines) -->
  <!-- Chenab -->
  <path d="M380,140 Q400,220 420,320 Q440,400 460,500 Q475,560 490,640" 
        fill="none" stroke="#60A5FA" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="438" y="460" class="river-label" transform="rotate(-80,438,460)">Chenab</text>
  
  <!-- Ravi -->
  <path d="M310,160 Q340,240 370,340 Q395,420 420,530 Q440,590 460,660" 
        fill="none" stroke="#60A5FA" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="380" y="440" class="river-label" transform="rotate(-75,380,440)">Ravi</text>

  <!-- Sutlej -->
  <path d="M530,180 Q550,260 570,360 Q590,440 610,540 Q630,600 660,670" 
        fill="none" stroke="#60A5FA" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="595" y="430" class="river-label" transform="rotate(-75,595,430)">Sutlej</text>

  <!-- Beas -->
  <path d="M560,200 Q580,280 600,370 Q615,440 625,530" 
        fill="none" stroke="#60A5FA" stroke-width="1.0" stroke-opacity="0.35"/>
  <text x="610" y="340" class="river-label" transform="rotate(-80,610,340)">Beas</text>

  <!-- RADCLIFFE LINE - dashed red/white -->
  <line x1="490" y1="130" x2="490" y2="670" 
        stroke="#EF4444" stroke-width="3" stroke-dasharray="12,6" stroke-opacity="0.9"/>
  <line x1="490" y1="130" x2="490" y2="670" 
        stroke="#FFFFFF" stroke-width="1" stroke-dasharray="12,6" stroke-opacity="0.3"/>
  <rect x="420" y="100" width="160" height="22" rx="4" fill="#1F2937" fill-opacity="0.9" stroke="#EF4444" stroke-width="1"/>
  <text x="500" y="116" text-anchor="middle" class="border-label">Radcliffe Line, 17 Aug 1947</text>

  <!-- MIGRATION ARROW: West → East (~4.5M Hindus & Sikhs) -->
  <!-- Large curved arrow from West Punjab to East Punjab -->
  <path d="M340,300 C420,260 560,260 650,300" 
        fill="none" stroke="#22C55E" stroke-width="40" stroke-opacity="0.15" stroke-linecap="round"/>
  <path d="M340,300 C420,260 560,260 650,300" 
        fill="none" stroke="#22C55E" stroke-width="3" stroke-opacity="0.9" stroke-linecap="round"
        marker-end="url(#arrow-east)" filter="url(#glow-green)"/>
  
  <!-- Arrow label -->
  <rect x="400" y="230" width="210" height="40" rx="6" fill="#0A0A0A" fill-opacity="0.85" stroke="#22C55E" stroke-width="1"/>
  <text x="505" y="248" text-anchor="middle" class="flow-label" fill="#22C55E">→ ~4.5 Million</text>
  <text x="505" y="264" text-anchor="middle" class="flow-sublabel">Hindus &amp; Sikhs moving East</text>

  <!-- MIGRATION ARROW: East → West (~4.5M Muslims) -->
  <!-- Large curved arrow from East Punjab to West Punjab -->
  <path d="M660,440 C560,480 420,480 340,440" 
        fill="none" stroke="#3B82F6" stroke-width="40" stroke-opacity="0.15" stroke-linecap="round"/>
  <path d="M660,440 C560,480 420,480 340,440" 
        fill="none" stroke="#3B82F6" stroke-width="3" stroke-opacity="0.9" stroke-linecap="round"
        marker-end="url(#arrow-west)" filter="url(#glow-blue)"/>
  
  <!-- Arrow label -->
  <rect x="400" y="470" width="210" height="40" rx="6" fill="#0A0A0A" fill-opacity="0.85" stroke="#3B82F6" stroke-width="1"/>
  <text x="505" y="488" text-anchor="middle" class="flow-label" fill="#3B82F6">← ~4.5 Million</text>
  <text x="505" y="504" text-anchor="middle" class="flow-sublabel">Muslims moving West</text>

  <!-- CITIES: West Punjab -->
  <circle cx="250" cy="280" r="5" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="250" y="270" text-anchor="middle" class="city-label">Lahore</text>
  
  <circle cx="220" cy="200" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="220" y="190" text-anchor="middle" class="city-label">Rawalpindi</text>
  
  <circle cx="280" cy="400" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="280" y="415" text-anchor="middle" class="city-label">Multan</text>
  
  <circle cx="370" cy="300" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="370" y="290" text-anchor="middle" class="city-label">Sialkot</text>

  <!-- CITIES: East Punjab -->
  <circle cx="570" cy="260" r="5" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="570" y="250" text-anchor="middle" class="city-label">Amritsar</text>
  
  <circle cx="660" cy="360" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="660" y="350" text-anchor="middle" class="city-label">Jullundur</text>
  
  <circle cx="740" cy="310" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="740" y="300" text-anchor="middle" class="city-label">Ludhiana</text>
  
  <circle cx="580" cy="370" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="580" y="385" text-anchor="middle" class="city-label">Ferozepur</text>

  <circle cx="550" cy="200" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="550" y="190" text-anchor="middle" class="city-label">Gurdaspur</text>

  <!-- TRAIN ICONS (simplified) -->
  <g transform="translate(300,530)">
    <rect x="-15" y="-8" width="30" height="16" rx="3" fill="#6B7280" stroke="#9CA3AF" stroke-width="1"/>
    <circle cx="-7" cy="8" r="3" fill="#9CA3AF"/>
    <circle cx="7" cy="8" r="3" fill="#9CA3AF"/>
    <rect x="-3" y="-12" width="6" height="4" rx="1" fill="#9CA3AF"/>
  </g>
  <text x="300" y="555" text-anchor="middle" style="font-size:9px;fill:#9CA3AF;">Railway Route</text>

  <g transform="translate(680,530)">
    <rect x="-15" y="-8" width="30" height="16" rx="3" fill="#6B7280" stroke="#9CA3AF" stroke-width="1"/>
    <circle cx="-7" cy="8" r="3" fill="#9CA3AF"/>
    <circle cx="7" cy="8" r="3" fill="#9CA3AF"/>
    <rect x="-3" y="-12" width="6" height="4" rx="1" fill="#9CA3AF"/>
  </g>

  <!-- REFUGEE CAMP ICONS (tent shapes) -->
  <g transform="translate(600,420)">
    <polygon points="0,-12 -10,4 10,4" fill="#F59E0B" fill-opacity="0.6" stroke="#F59E0B" stroke-width="1"/>
    <line x1="0" y1="-12" x2="0" y2="4" stroke="#F59E0B" stroke-width="0.8"/>
  </g>
  <g transform="translate(620,425)">
    <polygon points="0,-10 -8,3 8,3" fill="#F59E0B" fill-opacity="0.5" stroke="#F59E0B" stroke-width="0.8"/>
    <line x1="0" y1="-10" x2="0" y2="3" stroke="#F59E0B" stroke-width="0.6"/>
  </g>
  <g transform="translate(640,418)">
    <polygon points="0,-10 -8,3 8,3" fill="#F59E0B" fill-opacity="0.5" stroke="#F59E0B" stroke-width="0.8"/>
  </g>

  <g transform="translate(350,450)">
    <polygon points="0,-10 -8,3 8,3" fill="#F59E0B" fill-opacity="0.5" stroke="#F59E0B" stroke-width="0.8"/>
  </g>
  <g transform="translate(370,455)">
    <polygon points="0,-8 -6,2 6,2" fill="#F59E0B" fill-opacity="0.4" stroke="#F59E0B" stroke-width="0.7"/>
  </g>

  <!-- Train route lines (dotted) -->
  <path d="M250,285 Q350,350 490,320 Q570,300 650,365" 
        fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,4" stroke-opacity="0.5"/>
  <path d="M220,205 Q350,280 490,250 Q570,230 660,365" 
        fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,5" stroke-opacity="0.35"/>

  <!-- LEGEND -->
  <rect x="940" y="610" width="240" height="175" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#374151" stroke-width="1"/>
  <text x="960" y="635" class="legend-title">Legend</text>
  
  <!-- Arrow width legend -->
  <line x1="960" y1="658" x2="1010" y2="658" stroke="#22C55E" stroke-width="4" stroke-linecap="round"/>
  <text x="1020" y="662" class="legend-text">≈ 1 Million people</text>
  
  <!-- Arrow direction -->
  <line x1="960" y1="683" x2="1000" y2="683" stroke="#22C55E" stroke-width="3" marker-end="url(#arrow-east)"/>
  <text x="1020" y="687" class="legend-text">West → East</text>
  
  <line x1="960" y1="703" x2="1000" y2="703" stroke="#3B82F6" stroke-width="3"/>
  <text x="1020" y="707" class="legend-text">East → West</text>

  <!-- Camp icon -->
  <polygon points="975,720 967,732 983,732" fill="#F59E0B" fill-opacity="0.6" stroke="#F59E0B" stroke-width="1"/>
  <text x="1020" y="730" class="legend-text">Refugee Camp</text>

  <!-- Railway -->
  <line x1="960" y1="750" x2="1010" y2="750" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="1020" y="754" class="legend-text">Railway Route</text>

  <!-- Border -->
  <line x1="960" y1="772" x2="1010" y2="772" stroke="#EF4444" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="1020" y="776" class="legend-text">Radcliffe Border</text>

  <!-- Data source -->
  <text x="600" y="790" text-anchor="middle" class="source">Data: Census of India 1941 &amp; 1951; Ian Talbot &amp; Gurharpal Singh, "The Partition of India" (2009)</text>
</svg>
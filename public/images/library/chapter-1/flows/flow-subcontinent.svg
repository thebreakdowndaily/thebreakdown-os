<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 32px; font-weight: 700; fill: #FFFFFF; }
      .subtitle { font-size: 16px; font-weight: 400; fill: #9CA3AF; }
      .city-label { font-size: 11px; font-weight: 600; fill: #E5E7EB; }
      .city-major { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .flow-label { font-size: 14px; font-weight: 700; fill: #FFFFFF; }
      .flow-sublabel { font-size: 11px; font-weight: 400; fill: #D1D5DB; }
      .legend-text { font-size: 11px; font-weight: 400; fill: #9CA3AF; }
      .legend-title { font-size: 13px; font-weight: 600; fill: #FFFFFF; }
      .source { font-size: 10px; font-weight: 400; fill: #6B7280; }
      .total-label { font-size: 18px; font-weight: 700; fill: #F59E0B; }
      .total-sub { font-size: 12px; font-weight: 400; fill: #D1D5DB; }
      .camp-label { font-size: 9px; font-weight: 500; fill: #F59E0B; }
      .inset-title { font-size: 12px; font-weight: 700; fill: #FFFFFF; }
      .inset-text { font-size: 10px; font-weight: 400; fill: #D1D5DB; }
    </style>
    <marker id="arrow-g" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#22C55E"/>
    </marker>
    <marker id="arrow-r" markerWidth="14" markerHeight="10" refX="2" refY="5" orient="auto">
      <path d="M14,0 L0,5 L14,10 Z" fill="#EF4444"/>
    </marker>
    <marker id="arrow-r-rev" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#EF4444"/>
    </marker>
    <linearGradient id="bg-s" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow-sub" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg-s)"/>

  <!-- Title -->
  <text x="800" y="45" text-anchor="middle" class="title">Total Subcontinental Migration, 1947–1950</text>
  <text x="800" y="70" text-anchor="middle" class="subtitle">Synthesis of All Major Partition-Era Population Flows</text>

  <!-- TOTAL FIGURE (prominent) -->
  <rect x="580" y="82" width="440" height="55" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.7"/>
  <text x="800" y="108" text-anchor="middle" class="total-label">~14.5 Million People Displaced</text>
  <text x="800" y="126" text-anchor="middle" class="total-sub">1947–1950 · The largest mass migration in recorded history</text>

  <!-- SIMPLIFIED SUBCONTINENT OUTLINE -->
  <!-- India outline (very simplified, recognizable) -->
  <path d="M350,200 L450,170 L550,165 L640,180 L720,200 L800,230 L870,270 L940,320 L1000,380 L1050,450 L1080,530 L1100,600 L1100,680 L1080,740 L1040,800 L990,850 L930,880 L860,890 L790,880 L730,860 L680,830 L640,800 L600,760 L560,720 L530,680 L500,640 L470,600 L440,560 L420,520 L410,470 L400,420 L390,370 L380,320 L370,270 L360,240 Z" 
        fill="#1A2A3A" fill-opacity="0.25" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Pakistan West outline -->
  <path d="M350,200 L330,240 L310,290 L290,340 L270,390 L260,440 L280,480 L310,510 L340,530 L370,540 L400,540 L420,520 L410,470 L400,420 L390,370 L380,320 L370,270 L360,240 Z"
        fill="#1A3A2A" fill-opacity="0.25" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- East Pakistan (Bangladesh) outline -->
  <path d="M940,320 L980,310 L1030,330 L1070,370 L1100,420 L1110,480 L1100,540 L1070,590 L1030,620 L980,640 L940,630 L910,600 L900,560 L900,510 L910,460 L920,400 Z"
        fill="#1A3A2A" fill-opacity="0.25" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- RADCLIFFE LINE (entire) -->
  <!-- West Punjab border -->
  <path d="M395,200 Q398,300 400,400 Q402,470 405,540" 
        fill="none" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="10,5" stroke-opacity="0.8"/>
  <!-- East Bengal border -->
  <path d="M915,310 Q920,400 925,490 Q930,570 935,640" 
        fill="none" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="10,5" stroke-opacity="0.8"/>

  <!-- ═══════════ FLOW ARROWS ═══════════ -->

  <!-- 1. West Pakistan → India: ~5.3M (thick green) -->
  <path d="M310,380 C360,340 420,320 500,340" 
        fill="none" stroke="#22C55E" stroke-width="45" stroke-opacity="0.12" stroke-linecap="round"/>
  <path d="M310,380 C360,340 420,320 500,340" 
        fill="none" stroke="#22C55E" stroke-width="3.5" stroke-opacity="0.9" stroke-linecap="round"
        marker-end="url(#arrow-g)" filter="url(#glow-sub)"/>
  <rect x="340" y="310" width="160" height="35" rx="5" fill="#0A0A0A" fill-opacity="0.85" stroke="#22C55E" stroke-width="1"/>
  <text x="420" y="327" text-anchor="middle" class="flow-label" fill="#22C55E">~5.3M → India</text>
  <text x="420" y="340" text-anchor="middle" class="flow-sublabel">West Pakistan → India</text>

  <!-- 2. East Pakistan → India: ~3.5M (medium green) -->
  <path d="M1000,450 C960,420 910,410 850,430" 
        fill="none" stroke="#22C55E" stroke-width="30" stroke-opacity="0.12" stroke-linecap="round"/>
  <path d="M1000,450 C960,420 910,410 850,430" 
        fill="none" stroke="#22C55E" stroke-width="3" stroke-opacity="0.9" stroke-linecap="round"
        marker-end="url(#arrow-g)" filter="url(#glow-sub)"/>
  <rect x="870" y="400" width="155" height="35" rx="5" fill="#0A0A0A" fill-opacity="0.85" stroke="#22C55E" stroke-width="1"/>
  <text x="947" y="417" text-anchor="middle" class="flow-label" fill="#22C55E">~3.5M → India</text>
  <text x="947" y="430" text-anchor="middle" class="flow-sublabel">East Pakistan → India</text>

  <!-- 3. India → West Pakistan: ~5.7M (thick red) -->
  <path d="M480,460 C420,490 360,500 300,490" 
        fill="none" stroke="#EF4444" stroke-width="48" stroke-opacity="0.12" stroke-linecap="round"/>
  <path d="M480,460 C420,490 360,500 300,490" 
        fill="none" stroke="#EF4444" stroke-width="3.5" stroke-opacity="0.9" stroke-linecap="round"
        marker-end="url(#arrow-r)" filter="url(#glow-sub)"/>
  <rect x="340" y="490" width="160" height="35" rx="5" fill="#0A0A0A" fill-opacity="0.85" stroke="#EF4444" stroke-width="1"/>
  <text x="420" y="507" text-anchor="middle" class="flow-label" fill="#EF4444">← ~5.7M Pakistan</text>
  <text x="420" y="520" text-anchor="middle" class="flow-sublabel">India → West Pakistan</text>

  <!-- 4. India → East Pakistan: ~0.7M (thin red) -->
  <path d="M850,510 C890,530 940,540 990,530" 
        fill="none" stroke="#EF4444" stroke-width="12" stroke-opacity="0.12" stroke-linecap="round"/>
  <path d="M850,510 C890,530 940,540 990,530" 
        fill="none" stroke="#EF4444" stroke-width="2" stroke-opacity="0.9" stroke-linecap="round"
        marker-end="url(#arrow-r-rev)" filter="url(#glow-sub)"/>
  <rect x="870" y="535" width="155" height="35" rx="5" fill="#0A0A0A" fill-opacity="0.85" stroke="#EF4444" stroke-width="1"/>
  <text x="947" y="552" text-anchor="middle" class="flow-label" fill="#EF4444">← ~0.7M Pakistan</text>
  <text x="947" y="565" text-anchor="middle" class="flow-sublabel">India → East Pakistan</text>

  <!-- ═══════════ CITIES ═══════════ -->
  <!-- Delhi (major hub) -->
  <circle cx="540" cy="370" r="8" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2.5"/>
  <circle cx="540" cy="370" r="14" fill="none" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="540" y="355" text-anchor="middle" class="city-major">Delhi</text>

  <!-- Calcutta -->
  <circle cx="860" cy="470" r="7" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <circle cx="860" cy="470" r="12" fill="none" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
  <text x="860" y="455" text-anchor="middle" class="city-major">Calcutta</text>

  <!-- Bombay -->
  <circle cx="430" cy="580" r="5" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="430" y="600" text-anchor="middle" class="city-label">Bombay</text>

  <!-- Madras -->
  <circle cx="780" cy="740" r="5" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="780" y="760" text-anchor="middle" class="city-label">Madras</text>

  <!-- Karachi -->
  <circle cx="310" cy="470" r="5" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="310" y="490" text-anchor="middle" class="city-label">Karachi</text>

  <!-- Lahore -->
  <circle cx="420" cy="340" r="5" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="420" y="330" text-anchor="middle" class="city-label">Lahore</text>

  <!-- Dhaka -->
  <circle cx="1000" cy="480" r="5" fill="#F59E0B" stroke="#0A0A0A" stroke-width="2"/>
  <text x="1000" y="470" text-anchor="middle" class="city-label">Dhaka</text>

  <!-- ═══════════ REFUGEE CAMPS ═══════════ -->
  <!-- Delhi camps -->
  <g transform="translate(560,395)">
    <polygon points="0,-8 -6,3 6,3" fill="#F59E0B" fill-opacity="0.6" stroke="#F59E0B" stroke-width="0.7"/>
  </g>
  <g transform="translate(575,400)">
    <polygon points="0,-6 -5,2 5,2" fill="#F59E0B" fill-opacity="0.5" stroke="#F59E0B" stroke-width="0.6"/>
  </g>
  <text x="585" y="405" class="camp-label">Kingsway Camp</text>
  <g transform="translate(560,415)">
    <polygon points="0,-6 -5,2 5,2" fill="#F59E0B" fill-opacity="0.5" stroke="#F59E0B" stroke-width="0.6"/>
  </g>
  <text x="585" y="420" class="camp-label">Purana Qila</text>

  <!-- Calcutta camps -->
  <g transform="translate(880,490)">
    <polygon points="0,-7 -5,3 5,3" fill="#F59E0B" fill-opacity="0.6" stroke="#F59E0B" stroke-width="0.7"/>
  </g>
  <text x="900" y="495" class="camp-label">Sealdah</text>
  <g transform="translate(880,505)">
    <polygon points="0,-5 -4,2 4,2" fill="#F59E0B" fill-opacity="0.5" stroke="#F59E0B" stroke-width="0.6"/>
  </g>
  <text x="900" y="510" class="camp-label">Dhakuria</text>

  <!-- Karachi camp -->
  <g transform="translate(320,485)">
    <polygon points="0,-5 -4,2 4,2" fill="#F59E0B" fill-opacity="0.5" stroke="#F59E0B" stroke-width="0.6"/>
  </g>
  <text x="340" y="490" class="camp-label">Mochi Colony</text>

  <!-- ═══════════ KASHMIR INSET ═══════════ -->
  <rect x="370" y="195" width="180" height="110" rx="6" fill="#1F2937" fill-opacity="0.85" stroke="#A855F7" stroke-width="1.5"/>
  <text x="460" y="215" text-anchor="middle" class="inset-title" fill="#A855F7">Kashmir Conflict</text>
  <line x1="385" y1="225" x2="535" y2="225" stroke="#374151" stroke-width="1"/>
  <text x="460" y="242" text-anchor="middle" class="inset-text">Hari Singh accedes to India</text>
  <text x="460" y="256" text-anchor="middle" class="inset-text">Tribal invasion + Pakistani forces</text>
  <text x="460" y="270" text-anchor="middle" class="inset-text">Indian troops airlifted to Srinagar</text>
  <text x="460" y="284" text-anchor="middle" class="inset-text">~500K displaced from both sides</text>
  <text x="460" y="298" text-anchor="middle" style="font-size:9px;fill:#A855F7;">Line of Control established Jan 1949</text>

  <!-- ═══════════ LEGEND ═══════════ -->
  <rect x="1330" y="160" width="240" height="280" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#374151" stroke-width="1"/>
  <text x="1350" y="185" class="legend-title">Legend</text>
  <line x1="1350" y1="195" x2="1550" y2="195" stroke="#374151" stroke-width="1"/>

  <text x="1350" y="218" class="legend-title" style="font-size:11px;">Migration Flows</text>
  
  <line x1="1350" y1="240" x2="1400" y2="240" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
  <text x="1410" y="244" class="legend-text">→ To India (green)</text>
  
  <line x1="1350" y1="265" x2="1400" y2="265" stroke="#EF4444" stroke-width="5" stroke-linecap="round"/>
  <text x="1410" y="269" class="legend-text">→ To Pakistan (red)</text>

  <line x1="1350" y1="290" x2="1390" y2="290" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
  <text x="1410" y="294" class="legend-text">≈ 1 Million people</text>

  <line x1="1350" y1="315" x2="1390" y2="315" stroke="#22C55E" stroke-width="4" stroke-linecap="round"/>
  <text x="1410" y="319" class="legend-text">≈ 3 Million (thick)</text>

  <text x="1350" y="345" class="legend-title" style="font-size:11px;">Features</text>

  <circle cx="1360" cy="363" r="4" fill="#F59E0B" stroke="#0A0A0A" stroke-width="1.5"/>
  <text x="1375" y="367" class="legend-text">City</text>

  <circle cx="1360" cy="383" r="6" fill="none" stroke="#F59E0B" stroke-width="1"/>
  <text x="1375" y="387" class="legend-text">Major Hub</text>

  <polygon points="1360,400 1354,410 1366,410" fill="#F59E0B" fill-opacity="0.6"/>
  <text x="1375" y="410" class="legend-text">Refugee Camp</text>

  <line x1="1350" y1="425" x2="1390" y2="425" stroke="#EF4444" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="1410" y="429" class="legend-text">Radcliffe Border</text>

  <!-- ═══════════ COMPASS ROSE ═══════════ -->
  <g transform="translate(1450,800)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#374151" stroke-width="1"/>
    <line x1="0" y1="-25" x2="0" y2="25" stroke="#6B7280" stroke-width="1"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#6B7280" stroke-width="1"/>
    <polygon points="0,-28 -4,-18 4,-18" fill="#FFFFFF" fill-opacity="0.8"/>
    <text x="0" y="-35" text-anchor="middle" style="font-size:10px;fill:#FFFFFF;font-weight:600;">N</text>
    <text x="0" y="45" text-anchor="middle" style="font-size:8px;fill:#6B7280;">S</text>
    <text x="-38" y="4" text-anchor="middle" style="font-size:8px;fill:#6B7280;">W</text>
    <text x="38" y="4" text-anchor="middle" style="font-size:8px;fill:#6B7280;">E</text>
  </g>

  <!-- ═══════════ SCALE BAR ═══════════ -->
  <g transform="translate(1330,880)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#9CA3AF" stroke-width="1.5"/>
    <line x1="60" y1="-3" x2="60" y2="3" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="120" y1="-5" x2="120" y2="5" stroke="#9CA3AF" stroke-width="1.5"/>
    <text x="0" y="15" text-anchor="middle" style="font-size:9px;fill:#9CA3AF;">0</text>
    <text x="60" y="15" text-anchor="middle" style="font-size:9px;fill:#9CA3AF;">500 km</text>
    <text x="120" y="15" text-anchor="middle" style="font-size:9px;fill:#9CA3AF;">1000 km</text>
  </g>

  <!-- Data source -->
  <text x="800" y="985" text-anchor="middle" class="source">Data: Census of India (1941, 1951); Census of Pakistan (1951); Talbot &amp; Singh, "The Partition of India" (2009); Pandey, "Remembering Partition" (2001)</text>
</svg>
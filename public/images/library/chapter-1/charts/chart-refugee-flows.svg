<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Refugee flows during the Partition of India showing approximately 14.5 million displaced">
  <title>Refugee Flows During Partition — 1947–51</title>
  <desc>Sankey-inspired visualization showing bidirectional refugee flows between India and Pakistan, with approximately 14.5 million total displaced persons.</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');
    text { font-family: 'Inter', system-ui, sans-serif; }
    .title { fill: #FFFFFF; font-size: 28px; font-weight: 700; }
    .subtitle { fill: #A0A0A0; font-size: 16px; font-weight: 400; }
    .region-label { fill: #FFFFFF; font-size: 18px; font-weight: 700; }
    .region-sublabel { fill: #999999; font-size: 13px; font-weight: 400; }
    .flow-label { fill: #FFFFFF; font-size: 14px; font-weight: 600; }
    .flow-detail { fill: #CCCCCC; font-size: 12px; font-weight: 400; }
    .total-label { fill: #FFFFFF; font-size: 20px; font-weight: 700; }
    .total-sublabel { fill: #A0A0A0; font-size: 14px; font-weight: 400; }
    .legend-text { fill: #B0B0B0; font-size: 12px; font-weight: 400; }
    .source-citation { fill: #666666; font-size: 10px; font-weight: 400; }
    .border-line { stroke: #333333; stroke-width: 1; fill: none; }
  </style>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="60" y="48" class="title">The Great Migration — 14.5 Million Displaced</text>
  <text x="60" y="74" class="subtitle">Bidirectional refugee flows between India and Pakistan, 1947–51 (1951 Census data)</text>

  <!-- CENTRAL LAYOUT -->
  <!-- India block: left side (x=60-380) -->
  <!-- Pakistan block: right side (x=820-1140) -->
  <!-- Flow arrows: middle (x=380-820) -->

  <!-- ===================== INDIA BLOCK ===================== -->
  <rect x="60" y="110" width="320" height="520" rx="8" fill="#141414" stroke="#2A2A2A" stroke-width="1"/>
  <text x="220" y="148" text-anchor="middle" class="region-label">INDIA</text>
  <text x="220" y="168" text-anchor="middle" class="region-sublabel">Republic of India</text>
  <line x1="80" y1="180" x2="360" y2="180" stroke="#2A2A2A" stroke-width="1"/>

  <!-- India OUTGOING section -->
  <text x="220" y="206" text-anchor="middle" style="fill:#888; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px;">Outgoing — Hindus &amp; Sikhs</text>
  <text x="220" y="226" text-anchor="middle" style="fill:#666; font-size:11px;">Leaving West &amp; East Pakistan</text>

  <!-- India → Pakistan block: 5.7M + 0.7M = 6.4M total leaving India -->
  <!-- Bar proportional to 6.4M out of 14.5M total -->
  <!-- To West Pakistan: 5.7M -->
  <rect x="80" y="245" width="280" height="60" rx="4" fill="#C0392B" opacity="0.85"/>
  <text x="220" y="272" text-anchor="middle" class="flow-label">India → West Pakistan</text>
  <text x="220" y="292" text-anchor="middle" style="fill:#FFFFFF; font-size:16px; font-weight:700;">5.7 million</text>

  <!-- Sub-breakdown -->
  <rect x="90" y="315" width="120" height="36" rx="3" fill="#C0392B" opacity="0.5"/>
  <text x="150" y="330" text-anchor="middle" style="fill:#FFFFFF; font-size:12px; font-weight:600;">Punjab: ~4.5M</text>
  <text x="150" y="344" text-anchor="middle" style="fill:#FF9999; font-size:10px;">Other: ~1.2M</text>

  <!-- To East Pakistan: 0.7M -->
  <rect x="220" y="315" width="130" height="36" rx="3" fill="#C0392B" opacity="0.5"/>
  <text x="285" y="330" text-anchor="middle" style="fill:#FFFFFF; font-size:12px; font-weight:600;">India → E. Pakistan</text>
  <text x="285" y="344" text-anchor="middle" style="fill:#FF9999; font-size:10px;">0.7M</text>

  <!-- Divider -->
  <line x1="80" y1="368" x2="360" y2="368" stroke="#2A2A2A" stroke-width="1"/>
  <text x="220" y="394" text-anchor="middle" style="fill:#888; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px;">Incoming — Muslims</text>
  <text x="220" y="414" text-anchor="middle" style="fill:#666; font-size:11px;">Arriving from West &amp; East Pakistan</text>

  <!-- From Pakistan: 5.3M + 3.5M = 8.8M total arriving in India -->
  <rect x="80" y="430" width="280" height="60" rx="4" fill="#2980B9" opacity="0.85"/>
  <text x="220" y="457" text-anchor="middle" class="flow-label">Pakistan → India</text>
  <text x="220" y="477" text-anchor="middle" style="fill:#FFFFFF; font-size:16px; font-weight:700;">8.8 million</text>

  <!-- Sub-breakdowns -->
  <rect x="90" y="500" width="130" height="48" rx="3" fill="#2980B9" opacity="0.5"/>
  <text x="155" y="517" text-anchor="middle" style="fill:#FFFFFF; font-size:12px; font-weight:600;">West Pakistan → India</text>
  <text x="155" y="533" text-anchor="middle" style="fill:#99CCFF; font-size:11px;">5.3M (Punjab ~4.5M)</text>
  <text x="155" y="545" text-anchor="middle" style="fill:#99CCFF; font-size:10px;">Sindh ~0.5M · NWFP ~0.3M</text>

  <rect x="230" y="500" width="110" height="48" rx="3" fill="#2980B9" opacity="0.5"/>
  <text x="285" y="517" text-anchor="middle" style="fill:#FFFFFF; font-size:12px; font-weight:600;">E. Pakistan → India</text>
  <text x="285" y="533" text-anchor="middle" style="fill:#99CCFF; font-size:11px;">3.5M</text>
  <text x="285" y="545" text-anchor="middle" style="fill:#99CCFF; font-size:10px;">WB · Assam · Tripura</text>

  <!-- ===================== PAKISTAN BLOCK ===================== -->
  <rect x="820" y="110" width="320" height="520" rx="8" fill="#141414" stroke="#2A2A2A" stroke-width="1"/>
  <text x="980" y="148" text-anchor="middle" class="region-label">PAKISTAN</text>
  <text x="980" y="168" text-anchor="middle" class="region-sublabel">West &amp; East Pakistan</text>
  <line x1="840" y1="180" x2="1120" y2="180" stroke="#2A2A2A" stroke-width="1"/>

  <!-- Pakistan OUTGOING section -->
  <text x="980" y="206" text-anchor="middle" style="fill:#888; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px;">Outgoing — Muslims</text>
  <text x="980" y="226" text-anchor="middle" style="fill:#666; font-size:11px;">Leaving India for Pakistan</text>

  <rect x="840" y="245" width="280" height="60" rx="4" fill="#2980B9" opacity="0.85"/>
  <text x="980" y="272" text-anchor="middle" class="flow-label">Pakistan → India (incoming)</text>
  <text x="980" y="292" text-anchor="middle" style="fill:#FFFFFF; font-size:16px; font-weight:700;">8.8 million arrived</text>

  <rect x="850" y="315" width="260" height="36" rx="3" fill="#2980B9" opacity="0.5"/>
  <text x="980" y="337" text-anchor="middle" style="fill:#FFFFFF; font-size:12px; font-weight:600;">Muslim refugees FROM India: 6.4M total</text>

  <line x1="840" y1="368" x2="1120" y2="368" stroke="#2A2A2A" stroke-width="1"/>
  <text x="980" y="394" text-anchor="middle" style="fill:#888; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px;">Incoming — Hindus &amp; Sikhs</text>
  <text x="980" y="414" text-anchor="middle" style="fill:#666; font-size:11px;">Arriving from India</text>

  <rect x="840" y="430" width="280" height="60" rx="4" fill="#C0392B" opacity="0.85"/>
  <text x="980" y="457" text-anchor="middle" class="flow-label">India → Pakistan (arriving)</text>
  <text x="980" y="477" text-anchor="middle" style="fill:#FFFFFF; font-size:16px; font-weight:700;">6.4 million arrived</text>

  <rect x="850" y="500" width="260" height="36" rx="3" fill="#C0392B" opacity="0.5"/>
  <text x="980" y="522" text-anchor="middle" style="fill:#FFFFFF; font-size:12px; font-weight:600;">Hindu/Sikh refugees TO Pakistan: 5.7M</text>

  <!-- ===================== FLOW ARROWS (center) ===================== -->

  <!-- Arrow 1: India → West Pakistan (top, thick red) -->
  <!-- Flows rightward from India block to Pakistan block -->
  <defs>
    <linearGradient id="flow-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C0392B" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#E74C3C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C0392B" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="flow-blue" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2980B9" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#3498DB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2980B9" stop-opacity="0.4"/>
    </linearGradient>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E74C3C"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3498DB"/>
    </marker>
  </defs>

  <!-- Hindu/Sikh flow: India → West Pakistan (upper, ~5.7M, thick) -->
  <path d="M 380 275 C 500 275, 600 255, 820 255" stroke="url(#flow-red)" stroke-width="38" fill="none" opacity="0.5" marker-end="url(#arrow-red)"/>
  <text x="600" y="255" text-anchor="middle" style="fill:#FFCCCC; font-size:13px; font-weight:700;">Hindu &amp; Sikh → West Pakistan: 5.7M</text>

  <!-- Hindu/Sikh flow: India → East Pakistan (lower red, thin, ~0.7M) -->
  <path d="M 380 335 C 500 335, 600 330, 820 330" stroke="#C0392B" stroke-width="8" fill="none" opacity="0.35" marker-end="url(#arrow-red)"/>
  <text x="600" y="322" text-anchor="middle" style="fill:#FF9999; font-size:10px;">→ East Pakistan: 0.7M</text>

  <!-- Muslim flow: West Pakistan → India (upper blue, ~5.3M) -->
  <path d="M 820 455 C 700 455, 600 480, 380 480" stroke="url(#flow-blue)" stroke-width="36" fill="none" opacity="0.5" marker-end="url(#arrow-blue)"/>
  <text x="600" y="472" text-anchor="middle" style="fill:#CCE5FF; font-size:13px; font-weight:700;">Muslim → India: 8.8M total</text>

  <!-- Muslim flow: East Pakistan → India (lower blue, ~3.5M) -->
  <path d="M 820 530 C 700 530, 600 510, 380 510" stroke="#2980B9" stroke-width="24" fill="none" opacity="0.35" marker-end="url(#arrow-blue)"/>
  <text x="600" y="535" text-anchor="middle" style="fill:#99CCFF; font-size:10px;">W. Pakistan 5.3M · E. Pakistan 3.5M</text>

  <!-- ===================== CENTRAL STATISTICS ===================== -->
  <rect x="455" y="120" width="290" height="90" rx="8" fill="#1A1A1A" stroke="#333333" stroke-width="1"/>
  <text x="600" y="155" text-anchor="middle" class="total-label">~14.5 Million</text>
  <text x="600" y="176" text-anchor="middle" class="total-sublabel">Total displaced during Partition</text>
  <text x="600" y="200" text-anchor="middle" style="fill:#888; font-size:12px;">~20% of the affected population</text>

  <!-- ===================== ASYMMETRY NOTE ===================== -->
  <rect x="455" y="560" width="290" height="78" rx="8" fill="#1A1A1A" stroke="#FFD700" stroke-width="1" opacity="0.9"/>
  <text x="600" y="586" text-anchor="middle" style="fill:#FFD700; font-size:13px; font-weight:700;">KEY ASYMMETRY</text>
  <text x="600" y="604" text-anchor="middle" style="fill:#E0E0E0; font-size:12px;">More Muslims left India (6.4M)</text>
  <text x="600" y="620" text-anchor="middle" style="fill:#E0E0E0; font-size:12px;">than Hindus left Pakistan (6.4M).</text>
  <text x="600" y="634" text-anchor="middle" style="fill:#A0A0A0; font-size:10px;">Net Muslim inflow into India: +2.4M</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="60" y="650" width="14" height="14" rx="2" fill="#C0392B"/>
  <text x="80" y="662" class="legend-text">Hindu &amp; Sikh refugees (westbound: to Pakistan)</text>

  <rect x="60" y="672" width="14" height="14" rx="2" fill="#2980B9"/>
  <text x="80" y="684" class="legend-text">Muslim refugees (eastbound: to India)</text>

  <!-- ===================== DATA SOURCES ===================== -->
  <text x="60" y="720" class="source-citation">Data: Census of India 1951, Vol. I, Part I-A (Report); K. Singh, Population Disturbances in India (1951); T. Bose,</text>
  <text x="60" y="734" class="source-citation">Dead Reckoning (2015); I. Talbot &amp; G. Singh, The Partition of India (2009); S. Zamindar, The Long Partition (2007).</text>
  <text x="60" y="750" class="source-citation">Note: Figures are approximate. East/West Bengal figures vary between sources. Punjab was the primary corridor of displacement.</text>
</svg>
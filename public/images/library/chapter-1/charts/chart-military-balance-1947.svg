  <!-- Row 5 (cells 50-59): India 50-59 -->
  <rect x="65" y="295" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>
  <rect x="95" y="295" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>
  <rect x="125" y="295" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>

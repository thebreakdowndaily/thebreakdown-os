  <rect x="335" y="295" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>

  <!-- Row 6 (cells 60-69): India 60-66, Pakistan 67-69 -->
  <rect x="65" y="325" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>
  <rect x="95" y="325" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>

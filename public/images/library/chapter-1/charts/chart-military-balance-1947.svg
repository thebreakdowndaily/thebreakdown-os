  <!-- Waffle at top-left: x=60-340, y=110-390 -->
  <!-- Cell size: 26x26 with 2px gap = 28px per cell -->

  <rect x="60" y="105" width="280" height="28" rx="4" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="200" y="124" text-anchor="middle" class="section-title">ARMY MANPOWER</text>

  <!-- 10x10 waffle grid -->
  <!-- Row 0 (y=145): cells 0-9 -->
  <!-- India: 66 cells (fill sequentially), Pakistan: 33 cells -->
  <!-- Generate all 100 cells -->

  <!-- Row 0: cells 0-9 (all India) -->
  <rect x="65" y="145" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>
  <rect x="95" y="145" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>
  <rect x="125" y="145" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>
  <rect x="155" y="145" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>

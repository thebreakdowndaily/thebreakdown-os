  <!-- Waffle labels -->
  <text x="180" y="290" text-anchor="middle" class="waffle-text">INDIA</text>
  <text x="180" y="305" text-anchor="middle" style="fill:#FF9999; font-size:11px; font-weight:700;">66%</text>
  <text x="320" y="380" text-anchor="middle" class="waffle-text">PAKISTAN</text>
  <text x="320" y="395" text-anchor="middle" style="fill:#99CCFF; font-size:11px; font-weight:700;">33%</text>

  <!-- ===================== SERVICE BREAKDOWN BARS ===================== -->
  <!-- Right side: x=400-1140, 6 service categories -->

  <!-- Title -->
  <rect x="400" y="105" width="280" height="28" rx="4" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
  <text x="540" y="124" text-anchor="middle" class="section-title">SERVICE DIVISION</text>

  <!-- Each service row: ~55px tall -->
  <!-- India bar (left, red), Pakistan bar (right, blue) -->
  <!-- Bar area: x=400 to x=1120 = 720px total -->
  <!-- India bar: x=400 (India side), Pakistan bar: x=760 (Pakistan side) -->
  <!-- Scale: each bar max ~350px -->

  <!-- 1. INFANTRY REGIMENTS: India 33, Pakistan 13 (of 46) -->
  <!-- India bar = (33/46)*320 = 231px, Pakistan bar = (13/46)*320 = 90px -->
  <text x="400" y="170" class="bar-label">Infantry Regiments (46 total)</text>
  <rect x="400" y="178" width="231" height="22" rx="2" fill="#E74C3C"/>
  <text x="638" y="193" class="bar-value">33</text>
  <text x="658" y="193" class="bar-pct">(72%)</text>

  <rect x="760" y="178" width="90" height="22" rx="2" fill="#2980B9"/>
  <text x="858" y="193" class="bar-value">13</text>
  <text x="878" y="193" class="bar-pct">(28%)</text>

  <!-- 2. ARMOURED CORPS: India 8, Pakistan 3 (of 11) -->
  <text x="400" y="230" class="bar-label">Armoured Corps (11 regiments)</text>
  <!-- India: (8/11)*320 = 233px -->
  <rect x="400" y="238" width="233" height="22" rx="2" fill="#E74C3C"/>
  <text x="640" y="253" class="bar-value">8</text>
  <text x="658" y="253" class="bar-pct">(73%)</text>

  <!-- Pakistan: (3/11)*320 = 87px -->
  <rect x="760" y="238" width="87" height="22" rx="2" fill="#2980B9"/>
  <text x="855" y="253" class="bar-value">3</text>
  <text x="875" y="253" class="bar-pct">(27%)</text>

  <!-- 3. ARTILLERY: India 28, Pakistan 12 (of 40) -->
  <text x="400" y="290" class="bar-label">Artillery (40 regiments)</text>
  <!-- India: (28/40)*320 = 224px -->
  <rect x="400" y="298" width="224" height="22" rx="2" fill="#E74C3C"/>
  <text x="631" y="313" class="bar-value">28</text>
  <text x="651" y="313" class="bar-pct">(70%)</text>

  <!-- Pakistan: (12/40)*320 = 96px -->
  <rect x="760" y="298" width="96" height="22" rx="2" fill="#2980B9"/>
  <text x="864" y="313" class="bar-value">12</text>
  <text x="884" y="313" class="bar-pct">(30%)</text>

  <!-- 4. AIR FORCE SQUADRONS: India 7, Pakistan 3 (of 10) -->
  <text x="400" y="350" class="bar-label">Air Force (10 squadrons)</text>
  <!-- India: (7/10)*320 = 224px -->
  <rect x="400" y="358" width="224" height="22" rx="2" fill="#E74C3C"/>
  <text x="631" y="373" class="bar-value">7</text>
  <text x="651" y="373" class="bar-pct">(70%)</text>

  <!-- Pakistan: (3/10)*320 = 96px -->
  <rect x="760" y="358" width="96" height="22" rx="2" fill="#2980B9"/>
  <text x="864" y="373" class="bar-value">3</text>
  <text x="884" y="373" class="bar-pct">(30%)</text>

  <!-- 5. NAVAL VESSELS -->
  <text x="400" y="410" class="bar-label">Naval Vessels (major vessels)</text>
  <!-- India: ~18 major vessels, Pakistan: ~6 -->
  <rect x="400" y="418" width="192" height="22" rx="2" fill="#E74C3C"/>
  <text x="600" y="433" class="bar-value">4 sloops, 2 frigates, 12 minesweepers</text>
  <text x="820" y="433" class="bar-value">2 sloops, 4 minesweepers</text>

  <!-- 6. BUDGET: India Rs.240cr, Pakistan Rs.120cr (of Rs.360cr) -->
  <text x="400" y="470" class="bar-label">Budget Allocation (Rs. 360 crore)</text>
  <!-- India: (240/360)*320 = 213px -->
  <rect x="400" y="478" width="213" height="22" rx="2" fill="#E74C3C"/>
  <text x="620" y="493" class="bar-value">Rs. 240 crore</text>
  <text x="660" y="493" class="bar-pct">(67%)</text>

  <!-- Pakistan: (120/360)*320 = 107px -->
  <rect x="760" y="478" width="107" height="22" rx="2" fill="#2980B9"/>
  <text x="875" y="493" class="bar-value">Rs. 120 crore</text>
  <text x="920" y="493" class="bar-pct">(33%)</text>

  <!-- Divider between India/Pakistan -->
  <line x1="755" y1="155" x2="755" y2="510" stroke="#444" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="575" y="525" text-anchor="middle" style="fill:#E74C3C; font-size:12px; font-weight:700;">INDIA</text>
  <text x="840" y="525" text-anchor="middle" style="fill:#2980B9; font-size:12px; font-weight:700;">PAKISTAN</text>

  <!-- ===================== BOTTOM INSIGHT PANEL ===================== -->
  <rect x="60" y="550" width="1080" height="110" rx="6" fill="#141414" stroke="#FFD700" stroke-width="1"/>

  <text x="600" y="575" text-anchor="middle" style="fill:#FFD700; font-size:14px; font-weight:700;">THE 2:1 DIVISION</text>

  <text x="60" y="600" style="fill:#D0D0D0; font-size:12px;">
    <tspan>The 2:1 ratio was not arbitrary. It reflected the proportions of Muslim and non-Muslim soldiers in the British Indian Army.</tspan>
  </text>
  <text x="60" y="618" style="fill:#D0D0D0; font-size:12px;">
    <tspan>Field Marshal Auchinleck's Partition Committee allocated assets based on these proportions.</tspan>
  </text>
  <text x="60" y="636" style="fill:#D0D0D0; font-size:12px;">
    <tspan>However, Pakistan received fewer senior officers and less institutional knowledge. India retained the bulk of</tspan>
  </text>
  <text x="60" y="654" style="fill:#D0D0D0; font-size:12px;">
    <tspan>the officer corps, logistical infrastructure, and production capacity — advantages the ratio alone understates.</tspan>
  </text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="60" y="680" width="14" height="14" rx="2" fill="#E74C3C"/>
  <text x="80" y="692" class="legend-text">India (Dominion of India)</text>

  <rect x="280" y="680" width="14" height="14" rx="2" fill="#2980B9"/>
  <text x="300" y="692" class="legend-text">Pakistan (West &amp; East)</text>

  <!-- ===================== DATA SOURCES ===================== -->
  <text x="60" y="730" class="source-citation">Sources: Auchinleck Partition Committee Reports (1947); S. Sarkar, Modern India (1983); B. Pandit,</text>
  <text x="60" y="744" class="source-citation">My India (1969); C. Caroe, The Pathans (1958); Government of India, Defence Services Journal (1948); I. Tillman,</text>
  <text x="60" y="758" class="source-citation">"The Indian Army and the Partition" in Journal of Military History (2002); A. Jalal, The Sole Spokesman (1985).</text>
  <text x="60" y="774" class="source-citation">Note: Naval and air force figures approximate due to ongoing transfers and British retention of some assets.</text>

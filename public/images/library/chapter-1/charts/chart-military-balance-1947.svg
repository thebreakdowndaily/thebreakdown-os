  <rect x="65" y="385" width="26" height="26" fill="#2980B9" class="waffle-cell"/>
  <rect x="95" y="385" width="26" height="26" fill="#2980B9" class="waffle-cell"/>
  <rect x="125" y="385" width="26" height="26" fill="#2980B9" class="waffle-cell"/>

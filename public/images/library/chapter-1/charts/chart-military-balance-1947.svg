  <rect x="335" y="145" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>

  <!-- Row 1 (cells 10-19): India 10-19 -->
  <rect x="65" y="175" width="26" height="26" fill="#E74C3C" class="waffle-cell"/>

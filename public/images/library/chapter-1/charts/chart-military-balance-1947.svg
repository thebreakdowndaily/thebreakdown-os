<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Military balance between India and Pakistan at Partition in 1947">
  <title>India-Pakistan Military Balance, 1947</title>
  <desc>Waffle chart and comparison bars showing the division of military assets between India and Pakistan at Partition — the 2:1 ratio.</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');
    text { font-family: 'Inter', system-ui, sans-serif; }
    .title { fill: #FFFFFF; font-size: 28px; font-weight: 700; }
    .subtitle { fill: #A0A0A0; font-size: 16px; font-weight: 400; }
    .section-title { fill: #FFFFFF; font-size: 15px; font-weight: 700; }
    .section-subtitle { fill: #888888; font-size: 11px; }
    .bar-label { fill: #D0D0D0; font-size: 13px; font-weight: 500; }
    .bar-value { fill: #FFFFFF; font-size: 13px; font-weight: 700; }
    .bar-pct { fill: #AAAAAA; font-size: 11px; }
    .waffle-text { fill: #FFFFFF; font-size: 10px; font-weight: 600; }
    .legend-text { fill: #B0B0B0; font-size: 12px; font-weight: 400; }
    .source-citation { fill: #666666; font-size: 10px; font-weight: 400; }
    .india-color { fill: #E74C3C; }
    .pakistan-color { fill: #2980B9; }
    .india-stroke { stroke: #E74C3C; stroke-width: 1; }
    .pakistan-stroke { stroke: #2980B9; stroke-width: 1; }
    .waffle-cell { rx: 1; }
    .ratio-badge { fill: #1A1A1A; stroke: #FFD700; stroke-width: 1.5; rx: 6; }
    .ratio-text { fill: #FFD700; font-size: 14px; font-weight: 700; }
  </style>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="60" y="48" class="title">India-Pakistan Military Balance, 1947</text>
  <text x="60" y="74" class="subtitle">Division of Military Assets at Partition — Based on Auchinleck Partition Committee</text>

  <!-- 2:1 Ratio Badge -->
  <rect x="870" y="28" width="160" height="50" class="ratio-badge"/>
  <text x="950" y="48" text-anchor="middle" class="ratio-text">2 : 1</text>
  <text x="950" y="66" text-anchor="middle" style="fill:#AAAAAA; font-size:10px;">OVERALL RATIO</text>

  <!-- ===================== WAFFLE CHART: ARMY MANPOWER ===================== -->

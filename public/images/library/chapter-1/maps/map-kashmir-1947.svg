  <path d="M 420 280 C 440 270 460 265 480 265 C 500 265 520 270 535 280 C 550 290 558 305 558 320" stroke="#CC4444" stroke-width="3" fill="none" opacity="0.7" marker-end="url(#arrowInv)"/>

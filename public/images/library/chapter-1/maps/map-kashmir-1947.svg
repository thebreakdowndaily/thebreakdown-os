    <text x="32" y="113" font-size="8" fill="#AAAAAA">UNMOGIP observation post</text>
    <circle cx="19" cy="128" r="4" fill="#C4A34E" stroke="#FFF" stroke-width="0.5"/>
    <text x="32" y="131" font-size="8" fill="#AAAAAA">State capital</text>
    <circle cx="19" cy="146" r="3" fill="#FFF" stroke="#333" stroke-width="0.5"/>
    <text x="32" y="149" font-size="8" fill="#AAAAAA">Major town</text>
    <text x="12" y="170" font-size="7" fill="#888888">First India-Pakistan War</text>
    <text x="12" y="182" font-size="7" fill="#888888">Oct 1947 — Jan 1949</text>
    <text x="12" y="194" font-size="7" fill="#888888">Casualties: ~6,000 India, ~6,000 Pakistan</text>
  </g>


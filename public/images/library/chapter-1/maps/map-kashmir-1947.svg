  <path d="M 660 580 C 650 540 640 500 635 460 C 630 420 630 380 635 340 C 640 300 650 270 665 250" stroke="#4488CC" stroke-width="2.5" fill="none" opacity="0.7" stroke-dasharray="6,4" marker-end="url(#arrowInd)"/>

  <!-- Accession timeline panel -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="310" height="200" fill="#0A0A0A" opacity="0.9" stroke="#333333" stroke-width="0.5" rx="4"/>
    <text x="12" y="20" font-size="11" fill="#CCCCCC" font-weight="700">Accession Timeline</text>

    <rect x="12" y="30" width="8" height="8" fill="#C4A34E"/>
    <text x="26" y="39" font-size="8" fill="#AAAAAA">Acceded to India (562 states)</text>
    <rect x="12" y="46" width="8" height="8" fill="#2D5A2D"/>
    <text x="26" y="55" font-size="8" fill="#AAAAAA">Acceded to Pakistan</text>
    <rect x="12" y="62" width="8" height="8" fill="#C4A34E" stroke="#FF4444" stroke-width="1.5"/>
    <text x="26" y="71" font-size="8" fill="#AAAAAA">Disputed / Annexed</text>

    <line x1="12" y1="82" x2="298" y2="82" stroke="#333" stroke-width="0.5"/>

    <text x="12" y="98" font-size="8" fill="#FFFFFF" font-weight="600">13 June 1947</text>
    <text x="130" y="98" font-size="8" fill="#AAAAAA">Mountbatten Plan: princely states choose</text>

    <text x="12" y="116" font-size="8" fill="#FFFFFF" font-weight="600">15 Aug 1947</text>
    <text x="130" y="116" font-size="8" fill="#AAAAAA">Most states accede to India/Pakistan</text>

    <text x="12" y="134" font-size="8" fill="#FFFFFF" font-weight="600">26 Oct 1947</text>
    <text x="130" y="134" font-size="8" fill="#FF4444">Maharaja of J&amp;K signs Instrument</text>
    <text x="130" y="146" font-size="8" fill="#FF4444">of Accession to India</text>

    <text x="12" y="164" font-size="8" fill="#FFFFFF" font-weight="600">15 Sep 1948</text>
    <text x="130" y="164" font-size="8" fill="#FF4444">Hyderabad: Indian military Operation</text>
    <text x="130" y="176" font-size="8" fill="#FF4444">Polo annexes the state</text>

    <text x="12" y="194" font-size="8" fill="#FFFFFF" font-weight="600">Feb 1948</text>
    <text x="130" y="194" font-size="8" fill="#FF4444">Junagadh: India intervenes after</text>
    <text x="130" y="206" font-size="7" fill="#FF4444">Nawab's accession to Pakistan</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(50, 850)">
    <rect x="0" y="0" width="120" height="1" fill="#888888"/>

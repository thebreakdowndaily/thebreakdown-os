    <text x="60" y="12" font-size="7" fill="#888888" text-anchor="middle">0 — 300 — 600 km</text>
  </g>
  <g transform="translate(1520, 60)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#555555" stroke-width="0.5"/>
    <polygon points="0,-30 -4,-20 4,-20" fill="#C4A34E"/>
    <polygon points="0,30 -4,20 4,20" fill="#555555"/>
    <text x="0" y="-34" font-size="9" fill="#C4A34E" text-anchor="middle" font-weight="600">N</text>
  </g>

  <text x="40" y="40" font-size="28" font-weight="700" fill="#FFFFFF">Princely States: Accession, 1947–48</text>
  <text x="40" y="62" font-size="14" fill="#999999">562 States Choose India or Pakistan</text>

    <circle cx="19" cy="76" r="5" fill="none" stroke="#FFD700" stroke-width="2"/>
    <text x="32" y="79" font-size="8" fill="#AAAAAA">Disputed award (wrong side)</text>
    <text x="12" y="100" font-size="7" fill="#888888">Punjab partition: ~500,000 km² split</text>
    <text x="12" y="114" font-size="7" fill="#888888">Bengal partition: ~388,000 km² split</text>
    <text x="12" y="130" font-size="7" fill="#888888">Radcliffe had never visited India.</text>
    <text x="12" y="144" font-size="7" fill="#888888">Boundary drawn in 5 weeks.</text>
  </g>

  <text x="40" y="40" font-size="28" font-weight="700" fill="#FFFFFF">The Radcliffe Line, 1947</text>
  <text x="40" y="62" font-size="14" fill="#999999">India-Pakistan Boundary in Punjab and Bengal with Demographic Context</text>
  <text x="1590" y="890" font-size="7" fill="#555555" text-anchor="end">Boundary representation follows Book of Record #0003 — dashed lines indicate disputed borders.</text>

  <g transform="translate(50, 850)">
    <rect x="0" y="0" width="120" height="1" fill="#888888"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#888888" stroke-width="1"/>
    <line x1="60" y1="-3" x2="60" y2="3" stroke="#888888" stroke-width="0.8"/>
    <line x1="120" y1="-4" x2="120" y2="4" stroke="#888888" stroke-width="1"/>

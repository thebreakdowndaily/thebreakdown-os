  <text x="620" y="420" font-size="12" fill="#4A8AB5" font-weight="700" opacity="0.5">INDIA</text>

  <!-- Disputed cities (wrong side) -->
  <g>
    <!-- Gurdaspur (awarded to India despite Muslim majority tehsils) -->
    <circle cx="505" cy="170" r="5" fill="none" stroke="#FFD700" stroke-width="2"/>

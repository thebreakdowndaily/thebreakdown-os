  <g transform="translate(1340, 680)">
    <rect x="0" y="0" width="240" height="155" fill="#0A0A0A" opacity="0.85" stroke="#333333" stroke-width="0.5" rx="4"/>
    <text x="12" y="20" font-size="10" fill="#CCCCCC" font-weight="600">The Radcliffe Line</text>
    <line x1="12" y1="36" x2="60" y2="36" stroke="#CC3333" stroke-width="2.5" stroke-dasharray="8,5"/>
    <text x="70" y="39" font-size="8" fill="#AAAAAA">Radcliffe Boundary (disputed)</text>
    <rect x="12" y="50" width="14" height="10" fill="#4A3A6A" opacity="0.4"/>

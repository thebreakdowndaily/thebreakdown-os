<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
    <marker id="arrowH" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#5588CC"/></marker>
    <marker id="arrowM" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#CC8855"/></marker>
  </defs>
  <rect width="1600" height="900" fill="#0A0A0A"/>
  <rect width="1600" height="900" fill="#1A2A3A" opacity="0.35"/>
  <g opacity="0.12" stroke="#1A1A2A" stroke-width="0.5" fill="none">
    <line x1="44" y1="0" x2="44" y2="900"/><line x1="267" y1="0" x2="267" y2="900"/>
    <line x1="489" y1="0" x2="489" y2="900"/><line x1="711" y1="0" x2="711" y2="900"/>
    <line x1="933" y1="0" x2="933" y2="900"/><line x1="1156" y1="0" x2="1156" y2="900"/>
    <line x1="1378" y1="0" x2="1378" y2="900"/>
    <line x1="0" y1="783" x2="1600" y2="783"/><line x1="0" y1="642" x2="1600" y2="642"/>
    <line x1="0" y1="500" x2="1600" y2="500"/><line x1="0" y1="359" x2="1600" y2="359"/>
    <line x1="0" y1="218" x2="1600" y2="218"/><line x1="0" y1="76" x2="1600" y2="76"/>
  </g>


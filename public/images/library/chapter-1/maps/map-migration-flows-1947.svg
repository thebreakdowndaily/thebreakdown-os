  <path d="M 720 795 C 735 790 760 798 778 815 C 790 828 790 845 780 860 C 770 878 750 892 730 898 C 715 900 705 890 700 875 C 695 855 698 835 705 818 C 710 805 715 798 720 795 Z" fill="#2A2A3A" stroke="#555555" stroke-width="0.8"/>

  <!-- Radcliffe Line (dashed) -->
  <path d="M 578 156 C 580 180 575 200 570 220 C 565 240 555 260 545 280 C 535 300 520 320 505 340 C 490 360 470 380 450 400 C 430 420 410 435 390 448" stroke="#CC3333" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="8,5"/>
  <path d="M 1067 318 C 1065 340 1060 360 1055 380 C 1050 400 1042 420 1035 440 C 1028 455 1020 465 1012 475 C 1004 482 995 486 988 488" stroke="#CC3333" stroke-width="2" fill="none" opacity="0.6" stroke-dasharray="8,5"/>

  <!-- MIGRATION ARROWS: Punjab (West to East = Hindu/Sikh refugees to India) -->
  <!-- Major flow: ~5 million West Punjab to East Punjab -->
  <path d="M 440 220 C 470 240 500 260 540 280" stroke="#5588CC" stroke-width="8" fill="none" opacity="0.5" marker-end="url(#arrowH)"/>
  <path d="M 420 260 C 450 280 480 300 520 320" stroke="#5588CC" stroke-width="6" fill="none" opacity="0.45" marker-end="url(#arrowH)"/>
  <path d="M 400 300 C 430 310 460 320 500 330" stroke="#5588CC" stroke-width="5" fill="none" opacity="0.4" marker-end="url(#arrowH)"/>

  <!-- MIGRATION ARROWS: Bengal (East to West = Muslim refugees to East Pakistan) -->
  <path d="M 1100 430 C 1080 420 1060 410 1040 400" stroke="#CC8855" stroke-width="6" fill="none" opacity="0.45" marker-end="url(#arrowM)"/>
  <path d="M 1120 450 C 1100 440 1080 430 1060 420" stroke="#CC8855" stroke-width="5" fill="none" opacity="0.4" marker-end="url(#arrowM)"/>

  <!-- MIGRATION ARROWS: Bengal (West to East = Hindu refugees to India) -->
  <path d="M 1040 400 C 1060 410 1080 420 1100 430" stroke="#5588CC" stroke-width="5" fill="none" opacity="0.35" marker-end="url(#arrowH)"/>
  <path d="M 1020 430 C 1040 440 1060 450 1080 460" stroke="#5588CC" stroke-width="4" fill="none" opacity="0.3" marker-end="url(#arrowH)"/>

  <!-- Sea route: Karachi to Bombay -->
  <path d="M 133 390 C 180 430 250 480 330 520 C 360 535 380 540 391 537" stroke="#5588CC" stroke-width="3" fill="none" opacity="0.3" stroke-dasharray="4,3" marker-end="url(#arrowH)"/>
  <!-- Air route: Lahore to Delhi -->
  <path d="M 458 190 C 490 210 530 240 587 264" stroke="#5588CC" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="2,2"/>

  <!-- Migration volume labels -->
  <text x="480" y="245" font-size="10" fill="#5588CC" font-weight="600">~5M</text>
  <text x="480" y="258" font-size="7" fill="#7799CC">Hindu/Sikh refugees</text>
  <text x="480" y="270" font-size="7" fill="#7799CC">West Punjab → East Punjab</text>

  <text x="440" y="310" font-size="9" fill="#5588CC" font-weight="500">~3M</text>
  <text x="440" y="322" font-size="7" fill="#7799CC">Sindh → Gujarat/Rajasthan</text>

  <text x="1055" y="408" font-size="10" fill="#CC8855" font-weight="600">~2M</text>
  <text x="1055" y="421" font-size="7" fill="#DDAA77">Muslim refugees</text>
  <text x="1055" y="433" font-size="7" fill="#DDAA77">India → East Pakistan</text>

  <text x="1080" y="455" font-size="9" fill="#5588CC" font-weight="500">~2.5M</text>
  <text x="1080" y="467" font-size="7" fill="#7799CC">Hindu refugees</text>
  <text x="1080" y="479" font-size="7" fill="#7799CC">East Pakistan → India</text>

  <text x="260" y="470" font-size="8" fill="#5588CC" font-weight="400" opacity="0.6">Sea route</text>
  <text x="510" y="235" font-size="7" fill="#5588CC" opacity="0.5">Air lift</text>

  <!-- Key cities -->
  <circle cx="587" cy="264" r="4" fill="#C4A34E" stroke="#FFF" stroke-width="0.5"/>
  <circle cx="458" cy="183" r="3" fill="#FFFFFF" stroke="#333" stroke-width="0.5"/>
  <circle cx="1084" cy="433" r="3" fill="#FFFFFF" stroke="#333" stroke-width="0.5"/>
  <circle cx="133" cy="371" r="3" fill="#FFFFFF" stroke="#333" stroke-width="0.5"/>
  <circle cx="391" cy="537" r="3" fill="#FFFFFF" stroke="#333" stroke-width="0.5"/>
  <g font-size="8" fill="#BBBBBB">
    <text x="597" y="260">Delhi</text><text x="468" y="179">Lahore</text>
    <text x="1094" y="429">Calcutta</text><text x="105" y="368">Karachi</text>
    <text x="365" y="534">Bombay</text>
  </g>

  <!-- Statistics panel -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="280" height="65" fill="#0A0A0A" opacity="0.85" stroke="#333333" stroke-width="0.5" rx="4"/>
    <text x="12" y="18" font-size="10" fill="#CCCCCC" font-weight="600">Partition Migration, 1947–48</text>
    <text x="12" y="34" font-size="8" fill="#AAAAAA">Total displaced: 10–20 million people</text>
    <text x="12" y="48" font-size="8" fill="#AAAAAA">Deaths: 200,000 – 2,000,000 (estimates vary widely)</text>
    <text x="12" y="60" font-size="7" fill="#888888">Largest mass migration in human history</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(50, 850)">
    <rect x="0" y="0" width="120" height="1" fill="#888888"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#888888" stroke-width="1"/>
    <line x1="60" y1="-3" x2="60" y2="3" stroke="#888888" stroke-width="0.8"/>
    <line x1="120" y1="-4" x2="120" y2="4" stroke="#888888" stroke-width="1"/>
    <text x="60" y="12" font-size="7" fill="#888888" text-anchor="middle">0 — 300 — 600 km</text>
  </g>
  <g transform="translate(1520, 60)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#555555" stroke-width="0.5"/>
    <polygon points="0,-30 -4,-20 4,-20" fill="#C4A34E"/>
    <polygon points="0,30 -4,20 4,20" fill="#555555"/>
    <text x="0" y="-34" font-size="9" fill="#C4A34E" text-anchor="middle" font-weight="600">N</text>
  </g>

  <!-- Legend -->
  <g transform="translate(1340, 700)">
    <rect x="0" y="0" width="240" height="130" fill="#0A0A0A" opacity="0.85" stroke="#333333" stroke-width="0.5" rx="4"/>
    <text x="12" y="20" font-size="10" fill="#CCCCCC" font-weight="600">Migration Flows</text>
    <line x1="12" y1="36" x2="60" y2="36" stroke="#5588CC" stroke-width="6" opacity="0.6" marker-end="url(#arrowH)"/>
    <text x="70" y="39" font-size="8" fill="#AAAAAA">Hindu/Sikh to India</text>
    <line x1="12" y1="54" x2="60" y2="54" stroke="#CC8855" stroke-width="6" opacity="0.6" marker-end="url(#arrowM)"/>
    <text x="70" y="57" font-size="8" fill="#AAAAAA">Muslim to Pakistan</text>
    <line x1="12" y1="72" x2="60" y2="72" stroke="#5588CC" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="70" y="75" font-size="8" fill="#AAAAAA">Sea/Air routes</text>
    <line x1="12" y1="88" x2="60" y2="88" stroke="#CC3333" stroke-width="2" stroke-dasharray="8,5" opacity="0.6"/>
    <text x="70" y="91" font-size="8" fill="#AAAAAA">Radcliffe boundary</text>
    <text x="12" y="112" font-size="7" fill="#888888">Arrow width ∝ refugee volume</text>
  </g>

  <text x="40" y="40" font-size="28" font-weight="700" fill="#FFFFFF">Partition Migration Flows, 1947–48</text>
  <text x="40" y="62" font-size="14" fill="#999999">Population Movements Across the New Border</text>
  <text x="1590" y="890" font-size="7" fill="#555555" text-anchor="end">© The Breakdown Knowledge Platform. Migration estimates from Pandey (1997), Talbot (2007).</text>
</svg>

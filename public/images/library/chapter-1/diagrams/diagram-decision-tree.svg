<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: 700; fill: #FFFFFF; }
      .subtitle { font-size: 14px; font-weight: 400; fill: #9CA3AF; }
      .node-label { font-size: 12px; font-weight: 600; fill: #FFFFFF; }
      .node-sub { font-size: 10px; font-weight: 400; fill: #D1D5DB; }
      .edge-label { font-size: 9px; font-weight: 500; fill: #9CA3AF; }
      .outcome-label { font-size: 11px; font-weight: 600; }
      .alt-label { font-size: 10px; font-weight: 400; fill: #93C5FD; font-style: italic; }
      .quote-text { font-size: 11px; font-weight: 400; fill: #D1D5DB; font-style: italic; }
      .quote-author { font-size: 10px; font-weight: 600; fill: #F59E0B; }
      .legend-text { font-size: 11px; font-weight: 400; fill: #9CA3AF; }
      .legend-title { font-size: 12px; font-weight: 600; fill: #FFFFFF; }
      .source { font-size: 10px; font-weight: 400; fill: #6B7280; }
    </style>
    <linearGradient id="bg-dt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="dt-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="darr-down" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L4,8 L8,0 Z" fill="#F59E0B"/>
    </marker>
    <marker id="darr-down-alt" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L4,8 L8,0 Z" fill="#60A5FA"/>
    </marker>
    <marker id="darr-right" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#60A5FA"/>
    </marker>
    <clipPath id="clip-tree">
      <rect x="0" y="0" width="1150" height="1000"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg-dt)"/>

  <!-- Title -->
  <text x="580" y="40" text-anchor="middle" class="title">Decision Tree of Partition, 1945–1947</text>
  <text x="580" y="60" text-anchor="middle" class="subtitle">Key Decision Points and Alternative Paths</text>

  <!-- ═══════════ TREE (left portion, clipped) ═══════════ -->
  <g clip-path="url(#clip-tree)">

  <!-- NODE 1: Root -->
  <rect x="350" y="80" width="280" height="40" rx="8" fill="#1E3A5F" fill-opacity="0.4" stroke="#60A5FA" stroke-width="2" filter="url(#dt-glow)"/>
  <text x="490" y="105" text-anchor="middle" class="node-label" style="font-size:13px;">British Victory in WWII (1945)</text>

  <!-- Arrow to Node 2 -->
  <line x1="490" y1="120" x2="490" y2="150" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#darr-down)"/>

  <!-- NODE 2: Elections -->
  <rect x="340" y="150" width="300" height="40" rx="8" fill="#5C2D0E" fill-opacity="0.3" stroke="#F59E0B" stroke-width="2"/>
  <text x="490" y="175" text-anchor="middle" class="node-label" style="font-size:12px;">Elections in India (1945–46)</text>

  <!-- Branch from Node 2 -->
  <!-- Left branch: Congress wins -->
  <line x1="440" y1="190" x2="320" y2="220" stroke="#F59E0B" stroke-width="1.2"/>
  <rect x="200" y="215" width="220" height="32" rx="5" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="1"/>
  <text x="310" y="235" text-anchor="middle" class="node-sub">Congress wins 91% general seats</text>

  <!-- Right branch: League wins -->
  <line x1="540" y1="190" x2="660" y2="220" stroke="#22C55E" stroke-width="1.2"/>
  <rect x="560" y="215" width="220" height="32" rx="5" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="1"/>
  <text x="670" y="235" text-anchor="middle" class="node-sub">Muslim League wins 100% Muslim seats</text>

  <!-- Converge to Node 3 -->
  <line x1="310" y1="247" x2="440" y2="275" stroke="#F59E0B" stroke-width="1"/>
  <line x1="670" y1="247" x2="540" y2="275" stroke="#F59E0B" stroke-width="1"/>

  <!-- NODE 3: Cabinet Mission -->
  <rect x="330" y="275" width="320" height="40" rx="8" fill="#5C2D0E" fill-opacity="0.3" stroke="#F59E0B" stroke-width="2"/>
  <text x="490" y="300" text-anchor="middle" class="node-label" style="font-size:12px;">Cabinet Mission (Mar–Jul 1946)</text>

  <!-- Branch left: Plan accepted (faded/crossed out) -->
  <line x1="420" y1="315" x2="280" y2="350" stroke="#60A5FA" stroke-width="1" stroke-dasharray="5,4"/>
  <rect x="130" y="345" width="280" height="45" rx="6" fill="#1E3A5F" fill-opacity="0.1" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="270" y="365" text-anchor="middle" class="alt-label">Plan accepted by both parties</text>
  <text x="270" y="380" text-anchor="middle" class="alt-label">→ Federal India (alternative path)</text>
  <!-- X through this path -->
  <line x1="150" y1="355" x2="390" y2="385" stroke="#6B7280" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Branch right: Congress rejects -->
  <line x1="560" y1="315" x2="700" y2="350" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="580" y="345" width="240" height="45" rx="6" fill="#7F1D1D" fill-opacity="0.2" stroke="#EF4444" stroke-width="1" stroke-opacity="0.6"/>
  <text x="700" y="365" text-anchor="middle" class="outcome-label" fill="#FCA5A5">Congress rejects group scheme</text>
  <text x="700" y="380" text-anchor="middle" style="font-size:9px;fill:#FCA5A5;">Jinnah calls Direct Action</text>

  <!-- Arrow to Node 4 -->
  <line x1="700" y1="390" x2="700" y2="415" stroke="#EF4444" stroke-width="1.5" marker-end="url(#darr-down)"/>

  <!-- NODE 4: Direct Action Day -->
  <rect x="560" y="415" width="280" height="40" rx="8" fill="#7F1D1D" fill-opacity="0.3" stroke="#EF4444" stroke-width="2"/>
  <text x="700" y="440" text-anchor="middle" class="node-label" style="font-size:12px;">Direct Action Day (16 Aug 1946)</text>

  <!-- Branch: Could have been contained (faded) -->
  <line x1="620" y1="455" x2="480" y2="490" stroke="#60A5FA" stroke-width="1" stroke-dasharray="5,4"/>
  <rect x="350" y="485" width="240" height="40" rx="6" fill="#1E3A5F" fill-opacity="0.1" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="470" y="505" text-anchor="middle" class="alt-label">Could have been contained</text>
  <text x="470" y="517" text-anchor="middle" class="alt-label">→ Negotiated settlement possible</text>
  <line x1="360" y1="495" x2="580" y2="520" stroke="#6B7280" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Branch: Spirals into violence -->
  <line x1="780" y1="455" x2="780" y2="490" stroke="#EF4444" stroke-width="1.5"/>
  <rect x="660" y="485" width="240" height="40" rx="6" fill="#7F1D1D" fill-opacity="0.2" stroke="#EF4444" stroke-width="1" stroke-opacity="0.6"/>
  <text x="780" y="505" text-anchor="middle" class="outcome-label" fill="#FCA5A5">Spirals into communal violence</text>
  <text x="780" y="517" text-anchor="middle" style="font-size:9px;fill:#FCA5A5;">Great Calcutta Killings, 4,000+ dead</text>

  <!-- Arrow to Node 5 -->
  <line x1="780" y1="525" x2="780" y2="555" stroke="#EF4444" stroke-width="1.5" marker-end="url(#darr-down)"/>

  <!-- NODE 5: Mountbatten Plan -->
  <rect x="570" y="555" width="300" height="40" rx="8" fill="#5C2D0E" fill-opacity="0.3" stroke="#F59E0B" stroke-width="2"/>
  <text x="720" y="580" text-anchor="middle" class="node-label" style="font-size:12px;">Mountbatten Plan (3 Jun 1947)</text>

  <!-- Branch: Could have imposed Cabinet Mission (faded) -->
  <line x1="650" y1="595" x2="500" y2="630" stroke="#60A5FA" stroke-width="1" stroke-dasharray="5,4"/>
  <rect x="360" y="625" width="260" height="40" rx="6" fill="#1E3A5F" fill-opacity="0.1" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="490" y="645" text-anchor="middle" class="alt-label">Could have imposed Cabinet Mission</text>
  <text x="490" y="657" text-anchor="middle" class="alt-label">→ United India possible</text>
  <line x1="370" y1="635" x2="600" y2="660" stroke="#6B7280" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Branch: Accepts Partition -->
  <line x1="790" y1="595" x2="790" y2="630" stroke="#EF4444" stroke-width="1.5"/>
  <rect x="660" y="625" width="240" height="40" rx="6" fill="#7F1D1D" fill-opacity="0.2" stroke="#EF4444" stroke-width="1" stroke-opacity="0.6"/>
  <text x="780" y="645" text-anchor="middle" class="outcome-label" fill="#FCA5A5">Accepts Partition as only option</text>
  <text x="780" y="657" text-anchor="middle" style="font-size:9px;fill:#FCA5A5;">"The bloodbath can't wait"</text>

  <!-- Arrow to Node 6 -->
  <line x1="780" y1="665" x2="780" y2="695" stroke="#EF4444" stroke-width="1.5" marker-end="url(#darr-down)"/>

  <!-- NODE 6: Radcliffe Award -->
  <rect x="580" y="695" width="280" height="40" rx="8" fill="#7F1D1D" fill-opacity="0.3" stroke="#A855F7" stroke-width="2"/>
  <text x="720" y="720" text-anchor="middle" class="node-label" style="font-size:12px;">Radcliffe Award (13 Aug 1947)</text>

  <!-- Branch: Could have been fairer (faded) -->
  <line x1="660" y1="735" x2="520" y2="765" stroke="#60A5FA" stroke-width="1" stroke-dasharray="5,4"/>
  <rect x="390" y="760" width="240" height="35" rx="6" fill="#1E3A5F" fill-opacity="0.1" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="510" y="780" text-anchor="middle" class="alt-label">Could have been a fairer boundary</text>
  <line x1="400" y1="770" x2="610" y2="790" stroke="#6B7280" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Branch: Arbitrary line -->
  <line x1="780" y1="735" x2="780" y2="765" stroke="#A855F7" stroke-width="1.5"/>
  <rect x="660" y="760" width="240" height="35" rx="6" fill="#3B1F5E" fill-opacity="0.2" stroke="#A855F7" stroke-width="1" stroke-opacity="0.6"/>
  <text x="780" y="778" text-anchor="middle" style="font-size:10px;fill:#C4B5FD;font-weight:500;">Arbitrary line divides Punjab &amp; Bengal</text>
  <text x="780" y="790" text-anchor="middle" style="font-size:9px;fill:#C4B5FD;">5 weeks, no maps, never visited India</text>

  <!-- ═══════════ FINAL OUTCOME ═══════════ -->
  <line x1="780" y1="795" x2="490" y2="840" stroke="#EF4444" stroke-width="2"/>

  <rect x="280" y="840" width="420" height="55" rx="10" fill="#7F1D1D" fill-opacity="0.3" stroke="#EF4444" stroke-width="2.5" filter="url(#dt-glow)"/>
  <text x="490" y="865" text-anchor="middle" style="font-size:16px;fill:#FCA5A5;font-weight:700;">Partition &amp; Independence</text>
  <text x="490" y="885" text-anchor="middle" style="font-size:12px;fill:#FCA5A5;">14–15 August 1947</text>

  </g><!-- end clip -->

  <!-- ═══════════ HISTORIAN'S ASSESSMENT PANEL ═══════════ -->
  <rect x="1180" y="80" width="390" height="440" rx="10" fill="#1F2937" fill-opacity="0.95" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="1375" y="110" text-anchor="middle" style="font-size:14px;fill:#F59E0B;font-weight:700;">Historian's Assessment</text>
  <line x1="1200" y1="120" x2="1550" y2="120" stroke="#374151" stroke-width="1"/>

  <!-- Quote 1 -->
  <rect x="1200" y="135" width="350" height="80" rx="6" fill="#0A0A0A" fill-opacity="0.5"/>
  <text x="1215" y="160" class="quote-text">"Partition was not inevitable.</text>
  <text x="1215" y="175" class="quote-text">It was the result of political failures,</text>
  <text x="1215" y="190" class="quote-text">not historical destiny."</text>
  <text x="1215" y="208" class="quote-author">— Yasmin Khan, "The Great Partition" (2007)</text>

  <!-- Quote 2 -->
  <rect x="1200" y="225" width="350" height="80" rx="6" fill="#0A0A0A" fill-opacity="0.5"/>
  <text x="1215" y="250" class="quote-text">"The failure of the Cabinet Mission</text>
  <text x="1215" y="265" class="quote-text">made Partition certain."</text>
  <text x="1215" y="290" class="quote-author">— H.V. Hodson, "The Great Divide" (1969)</text>

  <!-- Quote 3 -->
  <rect x="1200" y="315" width="350" height="80" rx="6" fill="#0A0A0A" fill-opacity="0.5"/>
  <text x="1215" y="340" class="quote-text">"Radcliffe was given an impossible task</text>
  <text x="1215" y="355" class="quote-text">— five weeks, no proper maps,</text>
  <text x="1215" y="370" class="quote-text">and no knowledge of India."</text>
  <text x="1215" y="395" class="quote-author">— Lucy Chester, "Borders and Conflict" (2009)</text>

  <!-- Quote 4 -->
  <rect x="1200" y="405" width="350" height="80" rx="6" fill="#0A0A0A" fill-opacity="0.5"/>
  <text x="1215" y="430" class="quote-text">"Violence did not follow Partition —</text>
  <text x="1215" y="445" class="quote-text">violence produced Partition."</text>
  <text x="1215" y="470" class="quote-author">— Gyanendra Pandey, "Remembering Partition" (2001)</text>

  <!-- ═══════════ LEGEND ═══════════ -->
  <rect x="1180" y="540" width="390" height="150" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#374151" stroke-width="1"/>
  <text x="1200" y="565" class="legend-title">Legend</text>
  <line x1="1200" y1="575" x2="1550" y2="575" stroke="#374151" stroke-width="1"/>

  <line x1="1200" y1="595" x2="1250" y2="595" stroke="#F59E0B" stroke-width="2"/>
  <text x="1260" y="599" class="legend-text">Historical path (what happened)</text>

  <line x1="1200" y1="620" x2="1250" y2="620" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="1260" y="624" class="legend-text">Alternative path (what could have been)</text>

  <rect x="1200" y="640" width="50" height="16" rx="4" fill="#7F1D1D" fill-opacity="0.3" stroke="#EF4444" stroke-width="1"/>
  <text x="1260" y="652" class="legend-text">Critical decision point</text>

  <rect x="1200" y="665" width="50" height="16" rx="4" fill="#1E3A5F" fill-opacity="0.3" stroke="#60A5FA" stroke-width="1"/>
  <text x="1260" y="677" class="legend-text">Outcome / Event</text>

  <!-- ═══════════ COUNTERFACTUAL SIDEBAR ═══════════ -->
  <rect x="1180" y="710" width="390" height="80" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="1200" y="735" style="font-size:12px;fill:#93C5FD;font-weight:600;">Counterfactual Paths</text>
  <line x1="1200" y1="745" x2="1550" y2="745" stroke="#374151" stroke-width="1"/>
  <text x="1200" y="765" style="font-size:10px;fill:#93C5FD;">Dashed lines show alternative outcomes that</text>
  <text x="1200" y="780" style="font-size:10px;fill:#93C5FD;">historians have argued were plausible at each fork.</text>

  <!-- Data source -->
  <text x="580" y="985" text-anchor="middle" class="source">Sources: Yasmin Khan, "The Great Partition" (2007); H.V. Hodson, "The Great Divide" (1969); Lucy Chester, "Borders and Conflict" (2009); Gyanendra Pandey, "Remembering Partition" (2001)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 26px; font-weight: 700; fill: #FFFFFF; }
      .node-name { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .node-role { font-size: 9px; font-weight: 400; fill: #D1D5DB; }
      .edge-label { font-size: 9px; font-weight: 500; fill: #9CA3AF; }
      .legend-text { font-size: 11px; font-weight: 400; fill: #9CA3AF; }
      .legend-title { font-size: 12px; font-weight: 600; fill: #FFFFFF; }
      .source { font-size: 10px; font-weight: 400; fill: #6B7280; }
    </style>
    <linearGradient id="bg-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="node-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="edge-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg-d)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">Key Actors in the Partition of India, 1945–1948</text>
  <text x="600" y="60" text-anchor="middle" style="font-size:13px;fill:#6B7280;">Network of Political Relationships and Power Dynamics</text>

  <!-- ═══════════ EDGES (drawn first, behind nodes) ═══════════ -->

  <!-- Nehru ↔ Jinnah: Political rival -->
  <line x1="430" y1="340" x2="740" y2="340" stroke="#EF4444" stroke-width="2" stroke-dasharray="8,4" stroke-opacity="0.7" filter="url(#edge-glow)"/>
  <rect x="540" y="325" width="100" height="18" rx="4" fill="#1F2937" fill-opacity="0.9"/>
  <text x="590" y="338" text-anchor="middle" class="edge-label" fill="#EF4444">Political rival</text>

  <!-- Gandhi → Nehru: Mentor -->
  <line x1="540" y1="250" x2="440" y2="330" stroke="#22C55E" stroke-width="1.8" stroke-opacity="0.7"/>
  <rect x="460" y="270" width="70" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="495" y="282" text-anchor="middle" class="edge-label" fill="#22C55E">Mentor</text>

  <!-- Gandhi → Patel: Mentor -->
  <line x1="560" y1="260" x2="440" y2="430" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="470" y="340" width="70" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="505" y="352" text-anchor="middle" class="edge-label" fill="#22C55E">Mentor</text>

  <!-- Mountbatten ↔ Jinnah: Negotiation -->
  <line x1="600" y1="150" x2="760" y2="310" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="660" y="210" width="85" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="702" y="222" text-anchor="middle" class="edge-label" fill="#60A5FA">Negotiation</text>

  <!-- Mountbatten ↔ Nehru: Negotiation -->
  <line x1="590" y1="150" x2="440" y2="310" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="480" y="200" width="85" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="522" y="212" text-anchor="middle" class="edge-label" fill="#60A5FA">Negotiation</text>

  <!-- Nehru ↔ Patel: Shared vision -->
  <line x1="430" y1="360" x2="400" y2="420" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="390" y="382" width="80" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="430" y="394" text-anchor="middle" class="edge-label" fill="#22C55E">Shared vision</text>

  <!-- Jinnah ↔ Liaquat: Subordinate -->
  <line x1="770" y1="355" x2="870" y2="420" stroke="#F59E0B" stroke-width="1.2" stroke-opacity="0.6"/>
  <rect x="800" y="375" width="80" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="840" y="387" text-anchor="middle" class="edge-label" fill="#F59E0B">Subordinate</text>

  <!-- Mountbatten → Radcliffe: Imposed -->
  <line x1="620" y1="155" x2="730" y2="200" stroke="#A855F7" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="5,3"/>
  <rect x="645" y="160" width="75" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="682" y="172" text-anchor="middle" class="edge-label" fill="#A855F7">Imposed</text>

  <!-- Mountbatten → Hari Singh: Pressured -->
  <line x1="630" y1="160" x2="820" y2="620" stroke="#F59E0B" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4,4"/>
  <rect x="730" y="410" width="80" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="770" y="422" text-anchor="middle" class="edge-label" fill="#F59E0B">Pressured</text>

  <!-- Wavell → Mountbatten: Predecessor -->
  <line x1="250" y1="150" x2="530" y2="140" stroke="#6B7280" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3,5"/>
  <rect x="330" y="125" width="100" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="380" y="137" text-anchor="middle" class="edge-label" fill="#6B7280">Predecessor</text>

  <!-- Attlee → Mountbatten: Appointed -->
  <line x1="380" y1="100" x2="570" y2="130" stroke="#60A5FA" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="430" y="95" width="80" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="470" y="107" text-anchor="middle" class="edge-label" fill="#60A5FA">Appointed</text>

  <!-- Abdullah ↔ Hari Singh: Rival/Pressured -->
  <line x1="810" y1="660" x2="830" y2="630" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3,4"/>
  <rect x="785" y="665" width="70" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="820" y="677" text-anchor="middle" class="edge-label" fill="#F59E0B">Rival</text>

  <!-- Jinnah → Abdullah: Appeal -->
  <line x1="770" y1="350" x2="800" y2="640" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,5"/>
  <rect x="795" y="500" width="65" height="16" rx="3" fill="#1F2937" fill-opacity="0.9"/>
  <text x="827" y="512" text-anchor="middle" class="edge-label" fill="#22C55E">Appeal</text>

  <!-- ═══════════ NODES ═══════════ -->

  <!-- Mountbatten (top-center, British) -->
  <circle cx="600" cy="140" r="32" fill="#1E3A5F" stroke="#60A5FA" stroke-width="2.5" filter="url(#node-glow)"/>
  <text x="600" y="136" text-anchor="middle" class="node-name">Mountbatten</text>
  <text x="600" y="150" text-anchor="middle" class="node-role">Viceroy, 1947</text>

  <!-- Attlee (top-center-left, UK PM) -->
  <circle cx="380" cy="100" r="24" fill="#1E3A5F" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="380" y="97" text-anchor="middle" class="node-name" style="font-size:11px;">Attlee</text>
  <text x="380" y="110" text-anchor="middle" class="node-role">UK PM</text>

  <!-- Wavell (top-left, former Viceroy) -->
  <circle cx="250" cy="150" r="22" fill="#1E3A5F" stroke="#60A5FA" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="250" y="147" text-anchor="middle" class="node-name" style="font-size:10px;">Wavell</text>
  <text x="250" y="159" text-anchor="middle" class="node-role">Former Viceroy</text>

  <!-- Nehru (center-left, INC) -->
  <circle cx="420" cy="340" r="35" fill="#5C2D0E" stroke="#F59E0B" stroke-width="2.5" filter="url(#node-glow)"/>
  <text x="420" y="336" text-anchor="middle" class="node-name">Nehru</text>
  <text x="420" y="350" text-anchor="middle" class="node-role">INC · PM, 1947</text>

  <!-- Gandhi (center, INC) -->
  <circle cx="550" cy="240" r="30" fill="#5C2D0E" stroke="#F59E0B" stroke-width="2" filter="url(#node-glow)"/>
  <text x="550" y="236" text-anchor="middle" class="node-name">Gandhi</text>
  <text x="550" y="250" text-anchor="middle" class="node-role">INC · Moral Authority</text>

  <!-- Patel (center-left below, INC) -->
  <circle cx="380" cy="440" r="28" fill="#5C2D0E" stroke="#F59E0B" stroke-width="2"/>
  <text x="380" y="436" text-anchor="middle" class="node-name">Patel</text>
  <text x="380" y="450" text-anchor="middle" class="node-role">INC · Home Minister</text>

  <!-- Jinnah (center-right, AIML) -->
  <circle cx="760" cy="340" r="35" fill="#1A3A2A" stroke="#22C55E" stroke-width="2.5" filter="url(#node-glow)"/>
  <text x="760" y="336" text-anchor="middle" class="node-name">Jinnah</text>
  <text x="760" y="350" text-anchor="middle" class="node-role">AIML · Founder of Pakistan</text>

  <!-- Liaquat Ali Khan (right of Jinnah, AIML) -->
  <circle cx="890" cy="420" r="24" fill="#1A3A2A" stroke="#22C55E" stroke-width="1.5"/>
  <text x="890" y="416" text-anchor="middle" class="node-name" style="font-size:11px;">Liaquat</text>
  <text x="890" y="430" text-anchor="middle" class="node-role">AIML · PM</text>

  <!-- Radcliffe (top-center-right, Boundary Commission) -->
  <circle cx="740" cy="200" r="22" fill="#3B1F5E" stroke="#A855F7" stroke-width="1.5"/>
  <text x="740" y="197" text-anchor="middle" class="node-name" style="font-size:10px;">Radcliffe</text>
  <text x="740" y="209" text-anchor="middle" class="node-role">Boundary Commission</text>

  <!-- Hari Singh (bottom-right, Kashmir) -->
  <circle cx="840" cy="630" r="22" fill="#4A3500" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="840" y="627" text-anchor="middle" class="node-name" style="font-size:10px;">Hari Singh</text>
  <text x="840" y="639" text-anchor="middle" class="node-role">Maharaja, Kashmir</text>

  <!-- Abdullah (bottom, National Conference) -->
  <circle cx="810" cy="680" r="18" fill="#4A3500" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="810" y="677" text-anchor="middle" class="node-name" style="font-size:9px;">Abdullah</text>
  <text x="810" y="689" text-anchor="middle" class="node-role" style="font-size:8px;">Nat. Conf.</text>

  <!-- ═══════════ FACTION LABELS ═══════════ -->
  <rect x="100" y="320" width="130" height="50" rx="6" fill="#5C2D0E" fill-opacity="0.2" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
  <text x="165" y="345" text-anchor="middle" style="font-size:12px;fill:#F59E0B;font-weight:700;">Indian National</text>
  <text x="165" y="360" text-anchor="middle" style="font-size:12px;fill:#F59E0B;font-weight:700;">Congress (INC)</text>

  <rect x="960" y="330" width="180" height="50" rx="6" fill="#1A3A2A" fill-opacity="0.2" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1050" y="355" text-anchor="middle" style="font-size:12px;fill:#22C55E;font-weight:700;">All-India Muslim</text>
  <text x="1050" y="370" text-anchor="middle" style="font-size:12px;fill:#22C55E;font-weight:700;">League (AIML)</text>

  <rect x="100" y="130" width="120" height="40" rx="6" fill="#1E3A5F" fill-opacity="0.2" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.3"/>
  <text x="160" y="155" text-anchor="middle" style="font-size:11px;fill:#60A5FA;font-weight:600;">British Raj</text>

  <rect x="960" y="630" width="160" height="40" rx="6" fill="#4A3500" fill-opacity="0.2" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1040" y="655" text-anchor="middle" style="font-size:11px;fill:#F59E0B;font-weight:600;">Princely States</text>

  <!-- ═══════════ LEGEND ═══════════ -->
  <rect x="40" y="740" width="1120" height="130" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#374151" stroke-width="1"/>
  <text x="60" y="765" class="legend-title">Legend</text>
  <line x1="60" y1="775" x2="1140" y2="775" stroke="#374151" stroke-width="1"/>

  <!-- Faction colors -->
  <circle cx="80" cy="795" r="8" fill="#5C2D0E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="95" y="799" class="legend-text">INC (Congress)</text>

  <circle cx="220" cy="795" r="8" fill="#1A3A2A" stroke="#22C55E" stroke-width="1.5"/>
  <text x="235" y="799" class="legend-text">AIML (Muslim League)</text>

  <circle cx="380" cy="795" r="8" fill="#1E3A5F" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="395" y="799" class="legend-text">British Raj</text>

  <circle cx="510" cy="795" r="8" fill="#4A3500" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="525" y="799" class="legend-text">Princely States</text>

  <circle cx="660" cy="795" r="8" fill="#3B1F5E" stroke="#A855F7" stroke-width="1.5"/>
  <text x="675" y="799" class="legend-text">Boundary Commission</text>

  <!-- Edge styles -->
  <line x1="800" y1="795" x2="840" y2="795" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="850" y="799" class="legend-text">Rivalry / Opposition</text>

  <line x1="80" y1="830" x2="120" y2="830" stroke="#22C55E" stroke-width="1.5"/>
  <text x="130" y="834" class="legend-text">Alliance / Mentorship</text>

  <line x1="280" y1="830" x2="320" y2="830" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="330" y="834" class="legend-text">Negotiation</text>

  <line x1="460" y1="830" x2="500" y2="830" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="510" y="834" class="legend-text">Imposed authority</text>

  <line x1="660" y1="830" x2="700" y2="830" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="3,4"/>
  <text x="710" y="834" class="legend-text">Pressure / Subordination</text>

  <line x1="880" y1="830" x2="920" y2="830" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="930" y="834" class="legend-text">Predecessor / Successor</text>

  <!-- Node size legend -->
  <circle cx="80" cy="855" r="6" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <text x="95" y="859" class="legend-text">Secondary actor</text>
  <circle cx="220" cy="855" r="10" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="235" y="859" class="legend-text">Primary actor</text>

  <!-- Data source -->
  <text x="600" y="895" text-anchor="middle" class="source">Sources: Mountbatten Papers (MSL/1975/008); Nehru Memorial Museum &amp; Library; Yasmin Khan, "The Great Partition" (2007)</text>
</svg>
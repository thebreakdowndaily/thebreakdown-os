<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 26px; font-weight: 700; fill: #FFFFFF; }
      .subtitle { font-size: 14px; font-weight: 400; fill: #9CA3AF; }
      .box-title { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .box-sub { font-size: 10px; font-weight: 400; fill: #D1D5DB; }
      .group-label { font-size: 12px; font-weight: 700; fill: #FFFFFF; }
      .province-label { font-size: 10px; font-weight: 500; fill: #E5E7EB; }
      .legend-text { font-size: 11px; font-weight: 400; fill: #9CA3AF; }
      .legend-title { font-size: 12px; font-weight: 600; fill: #FFFFFF; }
      .source { font-size: 10px; font-weight: 400; fill: #6B7280; }
      .status-text { font-size: 11px; font-weight: 600; }
      .note-text { font-size: 12px; font-weight: 400; fill: #D1D5DB; font-style: italic; }
    </style>
    <linearGradient id="bg-cm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="box-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-up" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <path d="M0,8 L5,0 L10,8 Z" fill="#60A5FA"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="8" refX="5" refY="0" orient="auto">
      <path d="M0,0 L5,8 L10,0 Z" fill="#60A5FA"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-cm)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">Cabinet Mission Plan (May 1946)</text>
  <text x="600" y="60" text-anchor="middle" class="subtitle">Proposed Three-Tier Federal Structure for Independent India</text>

  <!-- Status badges -->
  <rect x="380" y="70" width="120" height="22" rx="11" fill="#7F1D1D" fill-opacity="0.6" stroke="#EF4444" stroke-width="1"/>
  <text x="440" y="85" text-anchor="middle" class="status-text" fill="#FCA5A5">REJECTED</text>
  
  <rect x="520" y="70" width="150" height="22" rx="11" fill="#7F1D1D" fill-opacity="0.6" stroke="#EF4444" stroke-width="1"/>
  <text x="595" y="85" text-anchor="middle" class="status-text" fill="#FCA5A5">COLLAPSED: JUL 1946</text>

  <!-- ═══════════ TIER 1: CENTRE ═══════════ -->
  <rect x="300" y="110" width="600" height="80" rx="10" fill="#1E3A5F" fill-opacity="0.3" stroke="#60A5FA" stroke-width="2.5" filter="url(#box-glow)"/>
  <text x="600" y="140" text-anchor="middle" class="box-title" style="font-size:16px;">All-India Union Centre</text>
  <text x="600" y="158" text-anchor="middle" class="box-sub" style="font-size:11px;">Seat: Delhi</text>
  <text x="600" y="175" text-anchor="middle" style="font-size:10px;fill:#93C5FD;">Subjects: Defence · Foreign Affairs · Communications · Currency</text>

  <!-- Tier label -->
  <rect x="120" y="130" width="140" height="28" rx="6" fill="#1E3A5F" fill-opacity="0.2" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="190" y="148" text-anchor="middle" style="font-size:11px;fill:#60A5FA;font-weight:600;">TIER 1: CENTRE</text>

  <!-- Arrows from groups to centre -->
  <line x1="400" y1="260" x2="500" y2="195" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="600" y1="260" x2="600" y2="195" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="800" y1="260" x2="700" y2="195" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Tier 2 label -->
  <rect x="120" y="310" width="160" height="28" rx="6" fill="#1E3A5F" fill-opacity="0.2" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="200" y="328" text-anchor="middle" style="font-size:11px;fill:#60A5FA;font-weight:600;">TIER 2: GROUPS</text>

  <!-- ═══════════ GROUP A ═══════════ -->
  <rect x="100" y="260" width="280" height="180" rx="8" fill="#5C2D0E" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2"/>
  <rect x="100" y="260" width="280" height="35" rx="8" fill="#5C2D0E" fill-opacity="0.3"/>
  <rect x="100" y="285" width="280" height="10" fill="#5C2D0E" fill-opacity="0.3"/>
  <text x="240" y="283" text-anchor="middle" class="group-label" fill="#F59E0B">Group A</text>
  <text x="240" y="310" text-anchor="middle" style="font-size:11px;fill:#FCD34D;font-weight:500;">Hindu-Majority Provinces</text>

  <!-- Provinces in Group A -->
  <rect x="115" y="325" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="172" y="341" text-anchor="middle" class="province-label">Bombay</text>
  
  <rect x="240" y="325" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="297" y="341" text-anchor="middle" class="province-label">Madras</text>

  <rect x="115" y="357" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="172" y="373" text-anchor="middle" class="province-label">United Provinces</text>

  <rect x="240" y="357" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="297" y="373" text-anchor="middle" class="province-label">Bihar</text>

  <rect x="115" y="389" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="172" y="405" text-anchor="middle" class="province-label">Central Provinces</text>

  <rect x="240" y="389" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="297" y="405" text-anchor="middle" class="province-label">Orissa</text>

  <!-- ═══════════ GROUP B ═══════════ -->
  <rect x="460" y="260" width="280" height="180" rx="8" fill="#1A3A2A" fill-opacity="0.15" stroke="#22C55E" stroke-width="2"/>
  <rect x="460" y="260" width="280" height="35" rx="8" fill="#1A3A2A" fill-opacity="0.3"/>
  <rect x="460" y="285" width="280" height="10" fill="#1A3A2A" fill-opacity="0.3"/>
  <text x="600" y="283" text-anchor="middle" class="group-label" fill="#22C55E">Group B</text>
  <text x="600" y="310" text-anchor="middle" style="font-size:11px;fill:#86EFAC;font-weight:500;">Muslim-Majority (Northwest)</text>

  <!-- Provinces in Group B -->
  <rect x="475" y="325" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="532" y="341" text-anchor="middle" class="province-label">Punjab</text>
  
  <rect x="600" y="325" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="657" y="341" text-anchor="middle" class="province-label">NWFP</text>

  <rect x="475" y="357" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="532" y="373" text-anchor="middle" class="province-label">Sind</text>

  <rect x="600" y="357" width="115" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="657" y="373" text-anchor="middle" class="province-label">Balochistan</text>

  <!-- ═══════════ GROUP C ═══════════ -->
  <rect x="820" y="260" width="280" height="180" rx="8" fill="#3B1F5E" fill-opacity="0.15" stroke="#A855F7" stroke-width="2"/>
  <rect x="820" y="260" width="280" height="35" rx="8" fill="#3B1F5E" fill-opacity="0.3"/>
  <rect x="820" y="285" width="280" height="10" fill="#3B1F5E" fill-opacity="0.3"/>
  <text x="960" y="283" text-anchor="middle" class="group-label" fill="#A855F7">Group C</text>
  <text x="960" y="310" text-anchor="middle" style="font-size:11px;fill:#C4B5FD;font-weight:500;">Mixed (East)</text>

  <!-- Provinces in Group C -->
  <rect x="880" y="325" width="160" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="960" y="341" text-anchor="middle" class="province-label">Bengal</text>

  <rect x="880" y="357" width="160" height="24" rx="4" fill="#1F2937" fill-opacity="0.7" stroke="#374151" stroke-width="0.8"/>
  <text x="960" y="373" text-anchor="middle" class="province-label">Assam</text>

  <!-- ═══════════ TIER 3: PROVINCIAL GOVERNMENTS ═══════════ -->
  <rect x="120" y="480" width="160" height="28" rx="6" fill="#1E3A5F" fill-opacity="0.2" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.4"/>
  <text x="200" y="498" text-anchor="middle" style="font-size:11px;fill:#60A5FA;font-weight:600;">TIER 3: PROVINCES</text>

  <!-- Tier 3 boxes under each group -->
  <!-- Group A provincial -->
  <rect x="130" y="460" width="220" height="50" rx="6" fill="#5C2D0E" fill-opacity="0.1" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="240" y="482" text-anchor="middle" style="font-size:11px;fill:#FCD34D;font-weight:500;">Group Legislature</text>
  <text x="240" y="498" text-anchor="middle" style="font-size:10px;fill:#FCD34D;">+ Group Executive</text>
  <line x1="240" y1="440" x2="240" y2="460" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrow-down)"/>

  <!-- Group B provincial -->
  <rect x="490" y="460" width="220" height="50" rx="6" fill="#1A3A2A" fill-opacity="0.1" stroke="#22C55E" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="482" text-anchor="middle" style="font-size:11px;fill:#86EFAC;font-weight:500;">Group Legislature</text>
  <text x="600" y="498" text-anchor="middle" style="font-size:10px;fill:#86EFAC;">+ Group Executive</text>
  <line x1="600" y1="440" x2="600" y2="460" stroke="#22C55E" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrow-down)"/>

  <!-- Group C provincial -->
  <rect x="850" y="460" width="220" height="50" rx="6" fill="#3B1F5E" fill-opacity="0.1" stroke="#A855F7" stroke-width="1" stroke-opacity="0.4"/>
  <text x="960" y="482" text-anchor="middle" style="font-size:11px;fill:#C4B5FD;font-weight:500;">Group Legislature</text>
  <text x="960" y="498" text-anchor="middle" style="font-size:10px;fill:#C4B5FD;">+ Group Executive</text>
  <line x1="960" y1="440" x2="960" y2="460" stroke="#A855F7" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrow-down)"/>

  <!-- Provincial gov boxes below group legislature -->
  <rect x="155" y="530" width="170" height="40" rx="5" fill="#1F2937" fill-opacity="0.6" stroke="#374151" stroke-width="1"/>
  <text x="240" y="548" text-anchor="middle" style="font-size:10px;fill:#D1D5DB;">Provincial Governments</text>
  <text x="240" y="561" text-anchor="middle" style="font-size:9px;fill:#9CA3AF;">Defence, Police, Health, Education</text>
  <line x1="240" y1="510" x2="240" y2="530" stroke="#374151" stroke-width="1"/>

  <rect x="515" y="530" width="170" height="40" rx="5" fill="#1F2937" fill-opacity="0.6" stroke="#374151" stroke-width="1"/>
  <text x="600" y="548" text-anchor="middle" style="font-size:10px;fill:#D1D5DB;">Provincial Governments</text>
  <text x="600" y="561" text-anchor="middle" style="font-size:9px;fill:#9CA3AF;">Defence, Police, Health, Education</text>
  <line x1="600" y1="510" x2="600" y2="530" stroke="#374151" stroke-width="1"/>

  <rect x="875" y="530" width="170" height="40" rx="5" fill="#1F2937" fill-opacity="0.6" stroke="#374151" stroke-width="1"/>
  <text x="960" y="548" text-anchor="middle" style="font-size:10px;fill:#D1D5DB;">Provincial Governments</text>
  <text x="960" y="561" text-anchor="middle" style="font-size:9px;fill:#9CA3AF;">Defence, Police, Health, Education</text>
  <line x1="960" y1="510" x2="960" y2="530" stroke="#374151" stroke-width="1"/>

  <!-- ═══════════ REJECTION MARKS ═══════════ -->
  <!-- X marks for rejection -->
  <g transform="translate(240,620)">
    <circle cx="0" cy="0" r="18" fill="#7F1D1D" fill-opacity="0.5" stroke="#EF4444" stroke-width="1.5"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#EF4444" stroke-width="2.5"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#EF4444" stroke-width="2.5"/>
  </g>
  <text x="240" y="650" text-anchor="middle" style="font-size:10px;fill:#FCA5A5;font-weight:600;">Congress rejected</text>
  <text x="240" y="663" text-anchor="middle" style="font-size:9px;fill:#FCA5A5;">group scheme (Jan 1946)</text>

  <g transform="translate(600,620)">
    <circle cx="0" cy="0" r="18" fill="#7F1D1D" fill-opacity="0.5" stroke="#EF4444" stroke-width="1.5"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#EF4444" stroke-width="2.5"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#EF4444" stroke-width="2.5"/>
  </g>
  <text x="600" y="650" text-anchor="middle" style="font-size:10px;fill:#FCA5A5;font-weight:600;">Muslim League rejected</text>
  <text x="600" y="663" text-anchor="middle" style="font-size:9px;fill:#FCA5A5;">then reversed, then rejected</text>

  <!-- ═══════════ STATUS PANEL ═══════════ -->
  <rect x="60" y="700" width="500" height="85" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="80" y="725" style="font-size:13px;fill:#FCA5A5;font-weight:700;">Timeline</text>
  <line x1="80" y1="735" x2="540" y2="735" stroke="#374151" stroke-width="1"/>
  
  <circle cx="100" cy="755" r="4" fill="#22C55E"/>
  <text x="110" y="759" class="legend-text">May 1946: Plan published</text>
  
  <circle cx="240" cy="755" r="4" fill="#F59E0B"/>
  <text x="250" y="759" class="legend-text">Jun: Congress accepts with reservations</text>

  <circle cx="100" cy="775" r="4" fill="#F59E0B"/>
  <text x="110" y="779" class="legend-text">Jul: Jinnah withdraws acceptance</text>

  <circle cx="340" cy="755" r="4" fill="#EF4444"/>
  <text x="355" y="759" class="legend-text">Aug: Direct Action Day</text>

  <circle cx="340" cy="775" r="4" fill="#EF4444"/>
  <text x="355" y="779" class="legend-text">Jul 1947: Plan dead; Partition</text>

  <!-- Counterfactual note -->
  <rect x="600" y="700" width="540" height="85" rx="8" fill="#1F2937" fill-opacity="0.9" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="620" y="725" class="note-text" fill="#F59E0B">"If implemented, this structure might</text>
  <text x="620" y="742" class="note-text" fill="#F59E0B">have averted Partition."</text>
  <text x="620" y="762" style="font-size:10px;fill:#9CA3AF;">The plan kept India united through a decentralised federation.</text>
  <text x="620" y="776" style="font-size:10px;fill:#9CA3AF;">Congress wanted a strong centre; the League wanted provincial autonomy.</text>

  <!-- Data source -->
  <text x="600" y="795" text-anchor="middle" class="source">Source: H.V. Hodson, "The Great Divide" (1969); Partition Archive; National Archives of India</text>
</svg>
theme: "The first India-Pakistan war over Kashmir established the terms of a conflict that remains unresolved 75 years later."
concept: "The partition framework left princely states to choose their allegiance. Kashmir was the case this framework could not handle — a Muslim-majority state with a Hindu ruler, bordering both India and Pakistan. The tribal invasion of October 1947, the Maharaja's accession to India, the military campaign, and the UN ceasefire produced an unresolved division that has caused four wars and an insurgency."

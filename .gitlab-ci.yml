image: mcr.microsoft.com/playwright:v1.40.0-jammy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .open-next/

stages:
  - install
  - typecheck
  - lint
  - build
  - playwright
  - accessibility
  - report
  - deploy

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

install:
  stage: install
  script:
    - npm ci --prefer-offline
  artifacts:
    paths:
      - node_modules/
    expire_in: 1h

typecheck:
  stage: typecheck
  dependencies:
    - install
  script:
    - npm run typecheck

lint:
  stage: lint
  dependencies:
    - install
  script:
    - npm run lint
  allow_failure: true

build:
  stage: build
  dependencies:
    - install
  script:
    - npm run build
    - npm run cf:build
  artifacts:
    paths:
      - .open-next/
      - .next/
      - public/
    expire_in: 1h

playwright:
  stage: playwright
  dependencies:
    - install
    - build
  script:
    - npm run test:e2e
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days

accessibility:
  stage: accessibility
  dependencies:
    - install
    - build
  script:
    - npx playwright test tests/e2e/accessibility.spec.ts
  artifacts:
    when: always
    paths:
      - playwright-report/
    expire_in: 30 days

upload_reports:
  stage: report
  dependencies:
    - playwright
    - accessibility
  script:
    - echo "Playwright and Accessibility reports are ready for review."
  artifacts:
    paths:
      - playwright-report/
    expire_in: 30 days

deploy_production:
  stage: deploy
  dependencies:
    - build
    - playwright
    - accessibility
  script:
    - npx wrangler pages deploy .open-next --project-name=thebreakdown-website --branch=main
  environment:
    name: production
    url: https://thebreakdown.in
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
